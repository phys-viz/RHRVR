<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right Hand Rule VR</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a; color: #c0c8d8;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; width: 100vw; height: 100vh;
        }
        #overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }
        #title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 22px; color: #00e5ff;
            letter-spacing: 3px; margin-bottom: 8px;
        }
        #subtitle { font-size: 15px; color: #607080; margin-bottom: 30px; }
        #enter-vr {
            pointer-events: auto; padding: 14px 36px;
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 18px; letter-spacing: 1px;
            background: linear-gradient(135deg, #00e5ff, #00b8d4);
            color: #0a0e1a; border: none; border-radius: 4px;
            cursor: pointer; text-transform: uppercase; transition: all 0.2s;
        }
        #enter-vr:hover { transform: scale(1.05); }
        #enter-vr:disabled { background: #2a3040; color: #556; cursor: not-allowed; transform: none; }
        #status { margin-top: 16px; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #ff5252; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="title">RIGHT HAND RULE VR</div>
        <div id="subtitle">Learn the cross product with your actual hand</div>
        <button id="enter-vr" disabled>Checking VR...</button>
        <div id="status"></div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
    import * as THREE from 'three';

    /* ═══════════════════════════════════════════════════════════
       PALETTE
    ═══════════════════════════════════════════════════════════ */
    const C = {
        bg: 0x0a0e1a, grid: 0x1a2236, gridCent: 0x243050,
        cyan: 0x00a8c8, amber: 0xe08820, green: 0x30b870,
        greenBright: 0x20c060,
        dim: 0x222a38, neutral: 0x556677, joint: 0x3a6a80,
    };
    const cCyan = new THREE.Color(C.cyan);
    const cAmber = new THREE.Color(C.amber);
    const cGreen = new THREE.Color(C.green);
    const cGreenBright = new THREE.Color(C.greenBright);
    const cDim = new THREE.Color(C.dim);
    const cNeutral = new THREE.Color(C.neutral);
    const cJoint = new THREE.Color(C.joint);
    const UP = new THREE.Vector3(0, 1, 0);

    /* ═══════════════════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════════════════ */
    const state = {
        mode: 'scaffolded',
        phase: 'waiting',
        // Phases: waiting → orienting → committing → locked → paused
        // orienting: flat hand, check fingers + palm
        // committing: fingers+palm aligned, make fist, check thumb
        currentV: new THREE.Vector3(), currentB: new THREE.Vector3(),
        expectedF: new THREE.Vector3(),
        fingerAlign: 0, palmAlign: 0, thumbAlign: 0,
        fingerOk: false, palmOk: false, thumbOk: false,
        isFist: false, thumbExtended: false,
        graceTimer: 0,
        score: { correct: 0, total: 0, skips: 0 },
        round: 0, difficulty: 'cardinal', streak: 0,
        handTracked: false, confirmedRightIdx: -1,
    };
    const ALIGN_THRESHOLD = 0.75;
    const STREAK_UNLOCK = 4;

    /* ═══════════════════════════════════════════════════════════
       SCENE
    ═══════════════════════════════════════════════════════════ */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(C.bg);
    scene.fog = new THREE.FogExp2(C.bg, 0.08);
    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 50);
    camera.position.set(0, 1.6, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.xr.enabled = true;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x334466, 0.6));
    const pt1 = new THREE.PointLight(C.cyan, 0.6, 12);
    pt1.position.set(0, 3, 0); scene.add(pt1);
    const pt2 = new THREE.PointLight(C.amber, 0.25, 8);
    pt2.position.set(2, 2, -2); scene.add(pt2);
    const grid = new THREE.GridHelper(20, 40, C.gridCent, C.grid);
    grid.material.transparent = true; grid.material.opacity = 0.35;
    scene.add(grid);

    /* ═══════════════════════════════════════════════════════════
       HAND SETUP
    ═══════════════════════════════════════════════════════════ */
    const xrHands = [renderer.xr.getHand(0), renderer.xr.getHand(1)];

    const JOINT_NAMES = [
        'wrist',
        'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
        'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
        'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
        'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
        'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
    ];

    const BONES = [
        ['wrist','thumb-metacarpal'],['thumb-metacarpal','thumb-phalanx-proximal'],
        ['thumb-phalanx-proximal','thumb-phalanx-distal'],['thumb-phalanx-distal','thumb-tip'],
        ['wrist','index-finger-metacarpal'],['index-finger-metacarpal','index-finger-phalanx-proximal'],
        ['index-finger-phalanx-proximal','index-finger-phalanx-intermediate'],
        ['index-finger-phalanx-intermediate','index-finger-phalanx-distal'],
        ['index-finger-phalanx-distal','index-finger-tip'],
        ['wrist','middle-finger-metacarpal'],['middle-finger-metacarpal','middle-finger-phalanx-proximal'],
        ['middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate'],
        ['middle-finger-phalanx-intermediate','middle-finger-phalanx-distal'],
        ['middle-finger-phalanx-distal','middle-finger-tip'],
        ['wrist','ring-finger-metacarpal'],['ring-finger-metacarpal','ring-finger-phalanx-proximal'],
        ['ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate'],
        ['ring-finger-phalanx-intermediate','ring-finger-phalanx-distal'],
        ['ring-finger-phalanx-distal','ring-finger-tip'],
        ['wrist','pinky-finger-metacarpal'],['pinky-finger-metacarpal','pinky-finger-phalanx-proximal'],
        ['pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate'],
        ['pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal'],
        ['pinky-finger-phalanx-distal','pinky-finger-tip'],
        ['index-finger-metacarpal','middle-finger-metacarpal'],
        ['middle-finger-metacarpal','ring-finger-metacarpal'],
        ['ring-finger-metacarpal','pinky-finger-metacarpal'],
    ];

    const PALM_TRIS = [
        ['wrist', 'index-finger-metacarpal', 'middle-finger-metacarpal'],
        ['wrist', 'middle-finger-metacarpal', 'ring-finger-metacarpal'],
        ['wrist', 'ring-finger-metacarpal', 'pinky-finger-metacarpal'],
        ['wrist', 'thumb-metacarpal', 'index-finger-metacarpal'],
        // Extra palm fill: proximal-to-proximal webbing
        ['index-finger-metacarpal', 'index-finger-phalanx-proximal', 'middle-finger-metacarpal'],
        ['middle-finger-metacarpal', 'middle-finger-phalanx-proximal', 'ring-finger-metacarpal'],
        ['ring-finger-metacarpal', 'ring-finger-phalanx-proximal', 'pinky-finger-metacarpal'],
        ['index-finger-metacarpal', 'middle-finger-phalanx-proximal', 'middle-finger-metacarpal'],
        ['middle-finger-metacarpal', 'ring-finger-phalanx-proximal', 'ring-finger-metacarpal'],
        ['ring-finger-metacarpal', 'pinky-finger-phalanx-proximal', 'pinky-finger-metacarpal'],
    ];

    const FINGER_JOINTS = new Set([
        'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
        'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
        'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
        'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
    ]);
    const THUMB_JOINTS = new Set(['thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip']);

    const FINGER_DEFS = [
        { distal: 'index-finger-phalanx-distal', tip: 'index-finger-tip' },
        { distal: 'middle-finger-phalanx-distal', tip: 'middle-finger-tip' },
        { distal: 'ring-finger-phalanx-distal', tip: 'ring-finger-tip' },
        { distal: 'pinky-finger-phalanx-distal', tip: 'pinky-finger-tip' },
    ];
    const THUMB_DEF = { distal: 'thumb-phalanx-distal', tip: 'thumb-tip' };

    const jp = {};      // raw joint positions
    const sp = {};      // smoothed joint positions
    for (const n of JOINT_NAMES) {
        jp[n] = new THREE.Vector3();
        sp[n] = new THREE.Vector3();
    }
    let smoothInited = false;
    const SMOOTH_FACTOR = 0.5; // 0 = no smoothing, higher = more smoothing

    function smoothJoints() {
        if (!smoothInited) {
            // First frame: snap smoothed to raw
            for (const n of JOINT_NAMES) sp[n].copy(jp[n]);
            smoothInited = true;
            return;
        }
        for (const n of JOINT_NAMES) {
            sp[n].lerp(jp[n], 1.0 - SMOOTH_FACTOR);
        }
    }

    /* ═══════════════════════════════════════════════════════════
       TUBE HAND
    ═══════════════════════════════════════════════════════════ */
    const tubeGroup = new THREE.Group();
    scene.add(tubeGroup);

    // Per-digit thickness multipliers (relative to base)
    const DIGIT_SCALE = {
        'thumb': 1.35,
        'index-finger': 0.95,
        'middle-finger': 1.05,
        'ring-finger': 0.95,
        'pinky-finger': 0.80,
    };

    function getDigit(name) {
        for (const d of ['thumb', 'index-finger', 'middle-finger', 'ring-finger', 'pinky-finger']) {
            if (name.startsWith(d)) return d;
        }
        return null;
    }

    function jr(name) {
        if (name === 'wrist') return 0.014;

        const digit = getDigit(name);
        const scale = digit ? DIGIT_SCALE[digit] : 1.0;

        // Base sizes per joint type — knuckle bulges at MCP and proximal
        if (name.includes('metacarpal')) return 0.010 * scale;
        if (name.includes('proximal'))   return 0.0095 * scale;  // knuckle bulge
        if (name.includes('intermediate')) return 0.007 * scale;
        if (name.includes('distal'))     return 0.006 * scale;
        if (name.includes('tip'))        return 0.008 * scale;   // fingertip pad — larger
        return 0.007;
    }

    function boneR(a, b) {
        // Get the thicker end's digit for scaling
        const digitA = getDigit(a);
        const digitB = getDigit(b);
        const digit = digitA || digitB;
        const scale = digit ? DIGIT_SCALE[digit] : 1.0;

        if (a === 'wrist' || b === 'wrist') return 0.007 * scale;
        if (a.includes('metacarpal') && b.includes('metacarpal')) return 0.006;
        if (a.includes('metacarpal') || b.includes('metacarpal')) return 0.006 * scale;
        if (a.includes('proximal') || b.includes('proximal')) return 0.0055 * scale;
        if (a.includes('intermediate') || b.includes('intermediate')) return 0.0045 * scale;
        return 0.004 * scale;
    }

    // Taper ratio: thicker at start (closer to palm), thinner at end
    function boneTaper(a, b) {
        // Return [startRadius, endRadius] multipliers
        // a is closer to palm, b is further out
        if (a.includes('metacarpal') && b.includes('proximal')) return [1.0, 0.85];
        if (a.includes('proximal') && b.includes('intermediate')) return [1.0, 0.75];
        if (a.includes('intermediate') && b.includes('distal')) return [0.9, 0.65];
        if (a.includes('distal') && b.includes('tip')) return [0.7, 0.85]; // widens at tip pad
        return [1.0, 0.9]; // default mild taper
    }

    const tubeJoints = {};
    for (const name of JOINT_NAMES) {
        const r = jr(name);
        const segs = name.includes('tip') ? 16 : 12; // rounder fingertips
        const geo = new THREE.SphereGeometry(r, segs, segs);
        const mat = new THREE.MeshStandardMaterial({
            color: C.joint, emissive: C.joint, emissiveIntensity: 0.2,
            roughness: 0.28, metalness: 0.15, transparent: true, opacity: 0.94,
        });
        const m = new THREE.Mesh(geo, mat);
        m.visible = false; tubeGroup.add(m); tubeJoints[name] = m;
    }

    const tubeBones = BONES.map(([a, b]) => {
        const r = boneR(a, b);
        const [taperStart, taperEnd] = boneTaper(a, b);
        const geo = new THREE.CylinderGeometry(r * taperEnd, r * taperStart, 1, 12, 1);
        const mat = new THREE.MeshStandardMaterial({
            color: C.joint, emissive: C.joint, emissiveIntensity: 0.15,
            roughness: 0.28, metalness: 0.15, transparent: true, opacity: 0.90,
        });
        const m = new THREE.Mesh(geo, mat);
        m.visible = false; tubeGroup.add(m);
        return { mesh: m, a, b };
    });

    const palmWebs = PALM_TRIS.map(([a, b, c]) => {
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(9), 3));
        const mat = new THREE.MeshStandardMaterial({
            color: C.joint, emissive: C.joint, emissiveIntensity: 0.1,
            roughness: 0.3, metalness: 0.12, transparent: true, opacity: 0.55,
            side: THREE.DoubleSide,
        });
        const m = new THREE.Mesh(geo, mat);
        m.visible = false; tubeGroup.add(m);
        return { mesh: m, a, b, c };
    });

    /* ═══════════════════════════════════════════════════════════
       OVERLAY ARROWS
    ═══════════════════════════════════════════════════════════ */
    function createOverlayArrow(len, headLen, headW) {
        const arrow = new THREE.ArrowHelper(
            new THREE.Vector3(0,1,0), new THREE.Vector3(), len, C.neutral, headLen, headW
        );
        arrow.cone.material = new THREE.MeshStandardMaterial({
            color: C.neutral, emissive: C.neutral, emissiveIntensity: 0.3,
            roughness: 0.4, transparent: true, opacity: 0.9,
        });
        arrow.line.material = new THREE.LineBasicMaterial({
            color: C.neutral, transparent: true, opacity: 0.9,
        });
        arrow.visible = false; scene.add(arrow);
        return arrow;
    }

    const fingerArrows = FINGER_DEFS.map(() => createOverlayArrow(0.05, 0.014, 0.008));
    const thumbOverlay = createOverlayArrow(0.055, 0.016, 0.009);
    const palmOverlay  = createOverlayArrow(0.07, 0.020, 0.012);

    function createLabel(text, cssColor) {
        const cv = document.createElement('canvas');
        cv.width = 128; cv.height = 64;
        const ctx = cv.getContext('2d');
        ctx.font = 'bold 40px Rajdhani, sans-serif';
        ctx.fillStyle = cssColor;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 64, 32);
        const tex = new THREE.CanvasTexture(cv);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sp = new THREE.Sprite(mat);
        sp.scale.set(0.04, 0.02, 1);
        sp.visible = false; scene.add(sp);
        return sp;
    }

    const fingerLabels = FINGER_DEFS.map(() => createLabel('v', '#00a8c8'));
    const thumbLbl = createLabel('F', '#30b870');
    const palmLbl = createLabel('B', '#e08820');

    /* ═══════════════════════════════════════════════════════════
       SCENE VECTORS
    ═══════════════════════════════════════════════════════════ */
    const vectorOrigin = new THREE.Vector3(0, 1.3, -0.8);
    const vectorTarget = new THREE.Vector3();
    const ARROW_LEN = 0.35;
    const TETHER_SPEED = 1.2;
    const TETHER_ANGLE = 0.65;

    const SHAFT_RADIUS = 0.008;
    const HEAD_LENGTH = 0.07;
    const HEAD_RADIUS = 0.035;

    function makeSceneArrow(color) {
        // Use ArrowHelper for rotation math, replace line with cylinder
        const arrow = new THREE.ArrowHelper(
            new THREE.Vector3(1,0,0), vectorOrigin.clone(), ARROW_LEN, color, HEAD_LENGTH, HEAD_RADIUS
        );

        // Replace cone material with emissive
        arrow.cone.material = new THREE.MeshStandardMaterial({
            color, emissive: color, emissiveIntensity: 0.3,
            roughness: 0.3, transparent: true, opacity: 0.95,
        });

        // Hide the default thin line
        arrow.line.visible = false;

        // Add a cylinder shaft
        const shaftLen = ARROW_LEN - HEAD_LENGTH;
        const shaftGeo = new THREE.CylinderGeometry(SHAFT_RADIUS, SHAFT_RADIUS, shaftLen, 10, 1);
        const shaftMat = new THREE.MeshStandardMaterial({
            color, emissive: color, emissiveIntensity: 0.3,
            roughness: 0.3, transparent: true, opacity: 0.95,
        });
        const shaft = new THREE.Mesh(shaftGeo, shaftMat);
        // Position shaft: ArrowHelper's local Y axis points along arrow direction
        // Shaft center at half the shaft length
        shaft.position.set(0, shaftLen / 2, 0);
        arrow.add(shaft);
        arrow._shaft = shaft; // store reference for emissive updates

        scene.add(arrow);
        return arrow;
    }

    function setSceneArrowEmissive(arrow, intensity) {
        arrow.cone.material.emissiveIntensity = intensity;
        if (arrow._shaft) arrow._shaft.material.emissiveIntensity = intensity;
    }

    const vArrow = makeSceneArrow(C.cyan);
    const bArrow = makeSceneArrow(C.amber);
    const fArrow = makeSceneArrow(C.green);
    [vArrow, bArrow, fArrow].forEach(a => {
        a.visible = false;
    });

    const SCENE_ARROW_BASE = 0.3;
    const SCENE_ARROW_MAX  = 1.2;

    function createVecLabel(text, cssColor) {
        const cv = document.createElement('canvas');
        cv.width = 128; cv.height = 64;
        const ctx = cv.getContext('2d');
        ctx.font = 'bold 44px Share Tech Mono, monospace';
        ctx.fillStyle = cssColor;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 64, 32);
        const tex = new THREE.CanvasTexture(cv);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sp = new THREE.Sprite(mat);
        sp.scale.set(0.08, 0.04, 1);
        scene.add(sp);
        return sp;
    }

    const vLbl = createVecLabel('v', '#00a8c8');
    const bLblScene = createVecLabel('B', '#e08820');
    const fLblScene = createVecLabel('F', '#30b870');
    vLbl.visible = false;
    bLblScene.visible = false;
    fLblScene.visible = false;

    function positionVecLabels() {
        const off = 0.43;
        vLbl.position.copy(vectorOrigin).addScaledVector(state.currentV, off);
        bLblScene.position.copy(vectorOrigin).addScaledVector(state.currentB, off);
        fLblScene.position.copy(vectorOrigin).addScaledVector(state.expectedF, off);
    }

    function computeVectorTarget() {
        camera.getWorldPosition(_camPos);
        camera.getWorldDirection(_camDir);
        _camDir.y = 0;
        if (_camDir.lengthSq() < 0.001) _camDir.set(0, 0, -1);
        _camDir.normalize();
        _camRight.crossVectors(_camDir, UP).normalize();
        vectorTarget.copy(_camPos)
            .addScaledVector(_camDir, 0.55)
            .addScaledVector(_camRight, 0.20);
        vectorTarget.y = _camPos.y - 0.35;
    }

    function snapVectorsToTarget() {
        vectorOrigin.copy(vectorTarget);
        vArrow.position.copy(vectorOrigin);
        bArrow.position.copy(vectorOrigin);
        fArrow.position.copy(vectorOrigin);
    }

    function tetherVectors(dt) {
        camera.getWorldPosition(_camPos);
        camera.getWorldDirection(_camDir);
        _tmpV.subVectors(vectorOrigin, _camPos).normalize();
        const angle = Math.acos(Math.max(-1, Math.min(1, _camDir.dot(_tmpV))));
        if (angle > TETHER_ANGLE) {
            computeVectorTarget();
            _tmpV.subVectors(vectorTarget, vectorOrigin);
            const d = _tmpV.length();
            if (d > 0.001) {
                vectorOrigin.addScaledVector(_tmpV.normalize(), Math.min(d, TETHER_SPEED * dt));
                vArrow.position.copy(vectorOrigin);
                bArrow.position.copy(vectorOrigin);
                fArrow.position.copy(vectorOrigin);
                positionVecLabels();
            }
        }
    }

    /* ═══════════════════════════════════════════════════════════
       HUD — tethered to stay in view
    ═══════════════════════════════════════════════════════════ */
    const hudTarget = new THREE.Vector3();
    const hudSeparation = new THREE.Vector3();
    const HUD_VECTOR_KEEP_OUT_RADIUS = ARROW_LEN + 0.24;
    const HUD_VECTOR_LATERAL_BIAS = 0.18;
    const HUD_VECTOR_VERTICAL_BIAS = 0.14;

    function computeHudTarget() {
        camera.getWorldPosition(_camPos);
        camera.getWorldDirection(_camDir);
        _camDir.y = 0;
        if (_camDir.lengthSq() < 0.001) _camDir.set(0, 0, -1);
        _camDir.normalize();
        _camRight.crossVectors(_camDir, UP).normalize();
        vectorTarget.copy(_camPos)
            .addScaledVector(_camDir, 0.55)
            .addScaledVector(_camRight, 0.20);
        vectorTarget.y = _camPos.y - 0.35;
        hudTarget.copy(_camPos)
            .addScaledVector(_camDir, 0.50)
            .addScaledVector(_camRight, -0.40);
        hudTarget.y = _camPos.y - 0.15;

        hudSeparation.subVectors(hudTarget, vectorTarget);
        const dist = hudSeparation.length();
        if (dist < HUD_VECTOR_KEEP_OUT_RADIUS) {
            if (dist > 0.001) {
                hudSeparation.multiplyScalar((HUD_VECTOR_KEEP_OUT_RADIUS - dist) / dist);
                hudTarget.add(hudSeparation);
            } else {
                hudTarget.addScaledVector(_camRight, -(HUD_VECTOR_KEEP_OUT_RADIUS + HUD_VECTOR_LATERAL_BIAS));
            }
            hudTarget.addScaledVector(_camRight, -HUD_VECTOR_LATERAL_BIAS);
            hudTarget.y += HUD_VECTOR_VERTICAL_BIAS;
        }
    }

    function snapHudToTarget() {
        hudMesh.position.copy(hudTarget);
    }

    function tetherHud(dt) {
        if (hudDragging) return;
        camera.getWorldPosition(_camPos);
        camera.getWorldDirection(_camDir);
        _tmpV.subVectors(hudMesh.position, _camPos).normalize();
        const angle = Math.acos(Math.max(-1, Math.min(1, _camDir.dot(_tmpV))));
        if (angle > TETHER_ANGLE) {
            computeHudTarget();
            _tmpV.subVectors(hudTarget, hudMesh.position);
            const d = _tmpV.length();
            if (d > 0.001) {
                hudMesh.position.addScaledVector(_tmpV.normalize(), Math.min(d, TETHER_SPEED * dt));
            }
        }
    }

    const hudCv = document.createElement('canvas');
    hudCv.width = 512; hudCv.height = 400;
    const hudCtx = hudCv.getContext('2d');
    const hudTex = new THREE.CanvasTexture(hudCv);
    hudTex.minFilter = THREE.LinearFilter;
    const hudMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(0.40, 0.32),
        new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, opacity: 0.95, side: THREE.DoubleSide })
    );
    hudMesh.position.set(-0.55, 1.55, -0.60);
    scene.add(hudMesh);
    const SKIP_BTN = { x: 156, y: 324, w: 200, h: 42 };
    let skipHover = false;
    let skipFlash = 0;
    let hudDragging = false;
    const hudDragOffset = new THREE.Vector3();

    function drawHUD() {
        const ctx = hudCtx;
        ctx.clearRect(0, 0, 512, 400);
        ctx.fillStyle = 'rgba(14, 20, 34, 0.92)';
        ctx.beginPath(); ctx.roundRect(6, 6, 500, 388, 12); ctx.fill();
        ctx.strokeStyle = '#2a4060'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(6, 6, 500, 388, 12); ctx.stroke();

        ctx.font = '700 30px Rajdhani, sans-serif';
        ctx.textAlign = 'center'; ctx.fillStyle = '#ffffff';
        ctx.fillText('RIGHT HAND RULE', 256, 44);

        ctx.font = '600 24px Share Tech Mono, monospace';
        ctx.fillStyle = state.mode === 'scaffolded' ? '#e08820' : '#30b870';
        ctx.fillText(state.mode === 'scaffolded' ? '[ SCAFFOLDED ]' : '[ PREDICTION ]', 256, 78);

        ctx.strokeStyle = '#2a4060'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(40, 94); ctx.lineTo(472, 94); ctx.stroke();

        ctx.font = '22px Share Tech Mono, monospace'; ctx.fillStyle = '#8899aa';
        ctx.fillText(`Round ${state.round}`, 256, 126);
        ctx.font = '700 38px Rajdhani, sans-serif'; ctx.fillStyle = '#f0f4f8';
        ctx.fillText(`${state.score.correct} / ${state.score.total}`, 256, 168);
        ctx.font = '18px Share Tech Mono, monospace'; ctx.fillStyle = '#667788';
        ctx.fillText(state.difficulty === 'cardinal' ? 'Cardinal axes' : 'Arbitrary 3D', 256, 196);
        ctx.fillText(`Skips ${state.score.skips}`, 256, 222);

        ctx.font = '600 26px Rajdhani, sans-serif';
        if (state.phase === 'waiting') {
            ctx.fillStyle = '#8899aa';
            ctx.fillText('Show your right hand to begin', 256, 252);
        } else if (state.phase === 'orienting') {
            ctx.fillStyle = '#c0d0e0';
            ctx.fillText('Orient your flat hand:', 256, 240);
            ctx.font = '22px Rajdhani, sans-serif';

            // Show check marks for aligned zones
            ctx.fillStyle = state.fingerOk ? '#20c060' : '#00a8c8';
            ctx.fillText((state.fingerOk ? '\u2713 ' : '') + 'Fingers \u2192 v', 256, 270);
            ctx.fillStyle = state.palmOk ? '#20c060' : '#e08820';
            ctx.fillText((state.palmOk ? '\u2713 ' : '') + 'Palm faces \u2192 B', 256, 296);

            if (state.fingerOk && state.palmOk) {
                ctx.font = '700 24px Rajdhani, sans-serif';
                ctx.fillStyle = '#20c060';
                ctx.fillText('\u2191 Make a fist \u2014 extend thumb!', 256, 336);
            }
        } else if (state.phase === 'committing') {
            ctx.fillStyle = '#20c060';
            ctx.fillText('Fist detected!', 256, 240);
            ctx.font = '22px Rajdhani, sans-serif';
            ctx.fillStyle = '#c0d0e0';
            ctx.fillText('Point your thumb along F...', 256, 272);

            ctx.fillStyle = state.thumbOk ? '#20c060' : '#8899aa';
            ctx.fillText((state.thumbOk ? '\u2713 ' : '') + 'Thumb \u2192 F', 256, 302);
        } else if (state.phase === 'locked') {
            ctx.fillStyle = '#20c060'; ctx.font = 'bold 32px Rajdhani, sans-serif';
            ctx.fillText('\u2713  CORRECT!', 256, 252);
            ctx.font = '22px Rajdhani, sans-serif'; ctx.fillStyle = '#c0d0e0';
            ctx.fillText('F = v \u00d7 B', 256, 286);
        } else if (state.phase === 'paused') {
            ctx.fillStyle = '#f0f4f8'; ctx.font = '700 28px Rajdhani, sans-serif';
            ctx.fillText('\u2713  CORRECT!', 256, 240);
            ctx.font = '24px Rajdhani, sans-serif'; ctx.fillStyle = '#c0d0e0';
            ctx.fillText('F = v \u00d7 B', 256, 272);
            ctx.font = '22px Rajdhani, sans-serif'; ctx.fillStyle = '#8899aa';
            ctx.fillText('Pinch to continue', 256, 312);
        }

        const showSkip = state.phase === 'orienting' || state.phase === 'committing';
        if (showSkip) {
            const flashT = Math.max(0, Math.min(1, skipFlash / 0.16));
            const fill = skipHover || flashT > 0
                ? `rgba(${40 + Math.round(60 * flashT)}, ${80 + Math.round(80 * flashT)}, ${120 + Math.round(60 * flashT)}, 0.95)`
                : 'rgba(20, 34, 52, 0.92)';
            ctx.fillStyle = fill;
            ctx.beginPath(); ctx.roundRect(SKIP_BTN.x, SKIP_BTN.y, SKIP_BTN.w, SKIP_BTN.h, 10); ctx.fill();
            ctx.strokeStyle = skipHover || flashT > 0 ? '#7fd8ff' : '#40607a';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(SKIP_BTN.x, SKIP_BTN.y, SKIP_BTN.w, SKIP_BTN.h, 10); ctx.stroke();
            ctx.font = '700 22px Rajdhani, sans-serif';
            ctx.fillStyle = '#d8f4ff';
            ctx.fillText('SKIP ROUND', 256, SKIP_BTN.y + 27);
        }

        ctx.font = '16px Rajdhani, sans-serif'; ctx.fillStyle = '#445566';
        ctx.fillText('Shake fist \u2192 toggle mode', 256, 384);
        hudTex.needsUpdate = true;
    }

    /* ═══════════════════════════════════════════════════════════
       PARTICLES
    ═══════════════════════════════════════════════════════════ */
    const pGeo = new THREE.SphereGeometry(0.015, 12, 12);
    const particles = [];
    function launchParticle(origin, dir) {
        const mat = new THREE.MeshStandardMaterial({
            color: C.greenBright, emissive: C.greenBright, emissiveIntensity: 0.8, transparent: true,
        });
        const m = new THREE.Mesh(pGeo, mat);
        m.position.copy(origin); scene.add(m);
        particles.push({ mesh: m, vel: dir.clone().multiplyScalar(0.8), life: 2.0 });
    }

    /* ═══════════════════════════════════════════════════════════
       VECTOR GENERATION
    ═══════════════════════════════════════════════════════════ */
    const CARDINALS = [
        new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
        new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0),
        new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1),
    ];

    function randomPerp(v) {
        let arb = new THREE.Vector3(1, 0, 0);
        if (Math.abs(v.dot(arb)) > 0.9) arb.set(0, 1, 0);
        const perp = new THREE.Vector3().crossVectors(v, arb).normalize();
        perp.applyQuaternion(new THREE.Quaternion().setFromAxisAngle(v, Math.random() * Math.PI * 2));
        return perp;
    }

    function isComfortableV(v) {
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);
        if (-v.dot(camDir) > 0.5) return false;
        if (v.y < -0.8) return false;
        return true;
    }

    function generateRound() {
        hudDragging = false;
        state.round++;
        state.phase = 'orienting';
        state.fingerOk = state.palmOk = state.thumbOk = false;
        state.fingerAlign = 0; state.palmAlign = 0; state.thumbAlign = 0;
        state.isFist = false; state.thumbExtended = false;
        state.graceTimer = 1.0; // 1 second grace period — no alignment feedback

        computeVectorTarget();
        snapVectorsToTarget();
        computeHudTarget();
        snapHudToTarget();

        let v, b, attempts = 0;
        if (state.difficulty === 'cardinal') {
            do { v = CARDINALS[Math.floor(Math.random() * 6)].clone(); attempts++; }
            while (!isComfortableV(v) && attempts < 30);
            const perps = CARDINALS.filter(c => Math.abs(c.dot(v)) < 0.1);
            b = perps[Math.floor(Math.random() * perps.length)].clone();
        } else {
            do {
                v = new THREE.Vector3(Math.random()*2-1, Math.random()*2-1, Math.random()*2-1).normalize();
                attempts++;
            } while (!isComfortableV(v) && attempts < 50);
            b = randomPerp(v);
        }

        state.currentV.copy(v);
        state.currentB.copy(b);
        state.expectedF.crossVectors(v, b).normalize();

        vArrow.setDirection(v); bArrow.setDirection(b);
        [vArrow, bArrow].forEach(a => {
            a.visible = true;
        });
        vLbl.visible = true; bLblScene.visible = true;
        fArrow.setDirection(state.expectedF);
        fArrow.visible = false;
        fLblScene.visible = false;

        setSceneArrowEmissive(vArrow, SCENE_ARROW_BASE);
        setSceneArrowEmissive(bArrow, SCENE_ARROW_BASE);
        positionVecLabels();
    }

    function skipRound() {
        hudDragging = false;
        state.score.total++;
        state.score.skips++;
        state.streak = 0;
        state.thumbOk = false;
        skipFlash = 0.16;
        playUiClick();
        generateRound();
    }

    /* ═══════════════════════════════════════════════════════════
       SPATIAL RIGHT-HAND DETECTION
    ═══════════════════════════════════════════════════════════ */
    // Pre-allocated vectors for spatial detection and tethering
    const _camPos = new THREE.Vector3();
    const _camDir = new THREE.Vector3();
    const _camRight = new THREE.Vector3();
    const _wristPos0 = new THREE.Vector3();
    const _wristPos1 = new THREE.Vector3();
    const _tmpV = new THREE.Vector3();
    const _hudLookAtPos = new THREE.Vector3();

    function findRightHandByHandedness() {
        const session = renderer.xr.getSession();
        if (!session) return -1;
        const sources = session.inputSources;
        for (let i = 0; i < Math.min(sources.length, xrHands.length); i++) {
            const src = sources[i];
            if (src?.hand && src.handedness === 'right') return i;
        }
        return -1;
    }

    function findRightHandSpatial() {
        const handednessIdx = findRightHandByHandedness();
        if (handednessIdx >= 0) return handednessIdx;

        const wristData = []; // lightweight, just idx + reuse pre-allocated
        for (let i = 0; i < 2; i++) {
            const hand = xrHands[i];
            if (hand.joints && hand.joints['wrist'] && hand.joints['index-finger-tip']) {
                const wPos = i === 0 ? _wristPos0 : _wristPos1;
                hand.joints['wrist'].getWorldPosition(wPos);
                wristData.push({ idx: i, pos: wPos });
            }
        }
        if (wristData.length === 0) return -1;
        if (wristData.length === 1) return wristData[0].idx;

        camera.getWorldPosition(_camPos);
        camera.getWorldDirection(_camDir);
        _camDir.y = 0;
        if (_camDir.lengthSq() < 0.001) _camDir.set(0, 0, -1);
        _camDir.normalize();
        _camRight.crossVectors(_camDir, UP).normalize();
        const d0 = _tmpV.subVectors(wristData[0].pos, _camPos).dot(_camRight);
        const d1 = _tmpV.subVectors(wristData[1].pos, _camPos).dot(_camRight);
        return d0 > d1 ? wristData[0].idx : wristData[1].idx;
    }

    let lastHandData = null;
    const _fingerDirs = FINGER_DEFS.map(() => new THREE.Vector3());
    const _avgFinger = new THREE.Vector3();
    const _avgFingerBase = new THREE.Vector3(); // metacarpal-based, stable through curl
    const _fingerBaseDirs = [new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3(), new THREE.Vector3()];
    const FINGER_BASE_DEFS = [
        { mcp: 'index-finger-metacarpal',  prox: 'index-finger-phalanx-proximal' },
        { mcp: 'middle-finger-metacarpal', prox: 'middle-finger-phalanx-proximal' },
        { mcp: 'ring-finger-metacarpal',   prox: 'ring-finger-phalanx-proximal' },
        { mcp: 'pinky-finger-metacarpal',  prox: 'pinky-finger-phalanx-proximal' },
    ];
    const _thumbDir = new THREE.Vector3();
    const _wristToMid = new THREE.Vector3();
    const _idxToPin = new THREE.Vector3();
    const _palmNormal = new THREE.Vector3();
    const _palmCenter = new THREE.Vector3();

    function readRightHand() {
        const detected = findRightHandSpatial();
        if (detected >= 0) state.confirmedRightIdx = detected;
        if (state.confirmedRightIdx < 0) { state.handTracked = false; return null; }

        const rHand = xrHands[state.confirmedRightIdx];
        if (!rHand.joints || !rHand.joints['wrist']) { state.handTracked = false; return null; }

        let ok = true;
        for (const name of JOINT_NAMES) {
            if (rHand.joints[name]) rHand.joints[name].getWorldPosition(jp[name]);
            else ok = false;
        }
        if (!ok) { state.handTracked = false; return null; }
        state.handTracked = true;

        // Smooth joint positions to reduce tracking jitter
        smoothJoints();

        // Finger directions (distal → tip) — use smoothed positions, reuse vectors
        for (let i = 0; i < FINGER_DEFS.length; i++) {
            const f = FINGER_DEFS[i];
            _fingerDirs[i].subVectors(sp[f.tip], sp[f.distal]).normalize();
        }
        _avgFinger.set(0, 0, 0);
        _fingerDirs.forEach(d => _avgFinger.add(d));
        _avgFinger.divideScalar(_fingerDirs.length).normalize();

        // Metacarpal-based finger direction (stable through curl)
        for (let i = 0; i < FINGER_BASE_DEFS.length; i++) {
            const f = FINGER_BASE_DEFS[i];
            _fingerBaseDirs[i].subVectors(sp[f.prox], sp[f.mcp]).normalize();
        }
        _avgFingerBase.set(0, 0, 0);
        _fingerBaseDirs.forEach(d => _avgFingerBase.add(d));
        _avgFingerBase.divideScalar(_fingerBaseDirs.length).normalize();

        // Thumb direction
        _thumbDir.subVectors(sp[THUMB_DEF.tip], sp[THUMB_DEF.distal]).normalize();

        // Palm normal
        _wristToMid.subVectors(sp['middle-finger-metacarpal'], sp['wrist']).normalize();
        _idxToPin.subVectors(sp['pinky-finger-metacarpal'], sp['index-finger-metacarpal']).normalize();
        _palmNormal.crossVectors(_wristToMid, _idxToPin).normalize();

        _palmCenter.addVectors(sp['wrist'], sp['middle-finger-metacarpal']).multiplyScalar(0.5);

        // Fist detection: fingertips close to palm center
        let fistClosed = true;
        for (const f of FINGER_DEFS) {
            if (sp[f.tip].distanceTo(_palmCenter) > 0.08) { fistClosed = false; break; }
        }

        // Thumb extended: thumb tip far from palm center
        const thumbExt = sp[THUMB_DEF.tip].distanceTo(_palmCenter) > 0.08;

        state.isFist = fistClosed;
        state.thumbExtended = thumbExt;

        lastHandData = { fingerDirs: _fingerDirs, avgFinger: _avgFinger, avgFingerBase: _avgFingerBase, thumbDir: _thumbDir, palmNormal: _palmNormal, palmCenter: _palmCenter };
        return lastHandData;
    }

    /* ═══════════════════════════════════════════════════════════
       FIST SHAKE (mode toggle — separate from commit fist)
    ═══════════════════════════════════════════════════════════ */
    const fistShake = {
        wristHistory: [], reversals: 0, lastDir: 0,
        lastReversalTime: 0, cooldown: 0,
    };

    function updateFistShake(dt) {
        if (fistShake.cooldown > 0) { fistShake.cooldown -= dt; return false; }
        if (!state.isFist) {
            fistShake.wristHistory = []; fistShake.reversals = 0; fistShake.lastDir = 0;
            return false;
        }
        const now = performance.now() / 1000;
        fistShake.wristHistory.push({ x: sp['wrist'].x, y: sp['wrist'].y, z: sp['wrist'].z, time: now });
        while (fistShake.wristHistory.length > 0 && now - fistShake.wristHistory[0].time > 1.5)
            fistShake.wristHistory.shift();
        if (fistShake.wristHistory.length < 3) return false;

        const prev = fistShake.wristHistory[fistShake.wristHistory.length - 2];
        const curr = fistShake.wristHistory[fistShake.wristHistory.length - 1];
        const delta = _tmpV.set(curr.x - prev.x, curr.y - prev.y, curr.z - prev.z);
        const speed = delta.length() / Math.max(0.001, curr.time - prev.time);
        if (speed < 0.3) return false;

        const ax = Math.abs(delta.x), ay = Math.abs(delta.y), az = Math.abs(delta.z);
        let dir = 0;
        if (ax >= ay && ax >= az) dir = Math.sign(delta.x);
        else if (ay >= ax && ay >= az) dir = Math.sign(delta.y);
        else dir = Math.sign(delta.z);

        if (fistShake.lastDir !== 0 && dir !== fistShake.lastDir) {
            fistShake.reversals++; fistShake.lastReversalTime = now;
        }
        fistShake.lastDir = dir;
        if (now - fistShake.lastReversalTime > 1.5) fistShake.reversals = 0;
        if (fistShake.reversals >= 3) {
            fistShake.reversals = 0; fistShake.wristHistory = [];
            fistShake.cooldown = 1.5; return true;
        }
        return false;
    }

    /* ═══════════════════════════════════════════════════════════
       PINCH (for "next round" in paused phase)
    ═══════════════════════════════════════════════════════════ */
    let wasPinching = false;
    let wasSkipTouching = false;
    function detectPinch() {
        if (!state.handTracked) return false;
        return sp['thumb-tip'].distanceTo(sp['index-finger-tip']) < 0.025;
    }

    const _hudLocalTip = new THREE.Vector3();
    const _hudWorldTip = new THREE.Vector3();
    const _pinchWorldPoint = new THREE.Vector3();
    function getHudTouchPoint() {
        if (!state.handTracked || !sp['index-finger-tip']) return null;
        _hudWorldTip.copy(sp['index-finger-tip']);
        hudMesh.worldToLocal(_hudLocalTip.copy(_hudWorldTip));
        if (Math.abs(_hudLocalTip.z) > 0.025) return null;

        const localX = _hudLocalTip.x / 0.40;
        const localY = _hudLocalTip.y / 0.32;
        if (Math.abs(localX) > 0.5 || Math.abs(localY) > 0.5) return null;

        return {
            x: (localX + 0.5) * 512,
            y: (0.5 - localY) * 400,
        };
    }

    function getPinchWorldPoint() {
        if (!state.handTracked || !sp['index-finger-tip'] || !sp['thumb-tip']) return null;
        return _pinchWorldPoint.copy(sp['index-finger-tip']).add(sp['thumb-tip']).multiplyScalar(0.5);
    }

    function isSkipButtonTouched() {
        if (!(state.phase === 'orienting' || state.phase === 'committing')) return false;
        const pt = getHudTouchPoint();
        if (!pt) return false;
        return pt.x >= SKIP_BTN.x && pt.x <= SKIP_BTN.x + SKIP_BTN.w &&
               pt.y >= SKIP_BTN.y && pt.y <= SKIP_BTN.y + SKIP_BTN.h;
    }

    function isHudDraggableTouched() {
        if (!(state.phase === 'orienting' || state.phase === 'committing' || state.phase === 'paused')) return false;
        const pt = getHudTouchPoint();
        return !!pt && !isSkipButtonTouched();
    }

    /* ═══════════════════════════════════════════════════════════
       AUDIO — ascending chord that builds with alignment
    ═══════════════════════════════════════════════════════════ */
    let audioCtx = null;
    let audioMaster = null;

    const TONES = [146.83, 220.0, 293.66]; // D3, A3, D4
    const GLIDE_TIME = 0.15;

    // Track active audio voices keyed by zone name
    const audioVoices = {};  // { zoneName: { osc, gain, active } }
    let audioInitialized = false;

    function initAudio() {
        if (audioInitialized) return;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioMaster = audioCtx.createGain();
            audioMaster.gain.value = 0.3;
            audioMaster.connect(audioCtx.destination);
            audioInitialized = true;
        } catch (e) {
            console.warn('Audio not available:', e);
        }
    }

    function activeAudioZones() {
        return Object.keys(audioVoices).filter(k => audioVoices[k] && audioVoices[k].active);
    }

    function reassignAudioPitches() {
        const active = activeAudioZones();
        active.forEach((name, i) => {
            const v = audioVoices[name];
            if (v && v.osc) {
                const targetFreq = TONES[i];
                v.osc.frequency.cancelScheduledValues(audioCtx.currentTime);
                v.osc.frequency.setValueAtTime(v.osc.frequency.value, audioCtx.currentTime);
                v.osc.frequency.linearRampToValueAtTime(targetFreq, audioCtx.currentTime + GLIDE_TIME);
            }
        });
    }

    function startAudioVoice(zoneName) {
        if (!audioInitialized) initAudio();
        if (!audioCtx) return;
        if (audioVoices[zoneName] && audioVoices[zoneName].active) return;

        // Resume context if suspended (needed for user gesture requirement)
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const voiceGain = audioCtx.createGain();
        voiceGain.gain.value = 0;
        voiceGain.connect(audioMaster);

        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        // Assign pitch based on current count of active voices
        const currentCount = activeAudioZones().length;
        osc.frequency.value = TONES[Math.min(currentCount, TONES.length - 1)];
        osc.connect(voiceGain);
        osc.start();

        // Fade in
        voiceGain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.35);

        audioVoices[zoneName] = { osc, gain: voiceGain, active: true };
    }

    function stopAudioVoice(zoneName, fadeTime) {
        fadeTime = fadeTime || 0.6;
        const v = audioVoices[zoneName];
        if (!v || !v.active) return;

        const now = audioCtx.currentTime;
        v.gain.gain.cancelScheduledValues(now);
        v.gain.gain.setValueAtTime(v.gain.gain.value, now);
        v.gain.gain.linearRampToValueAtTime(0, now + fadeTime);

        const osc = v.osc;
        setTimeout(() => { try { osc.stop(); } catch(e) {} }, fadeTime * 1000 + 50);

        audioVoices[zoneName] = null;

        // Remaining voices shift down
        reassignAudioPitches();
    }

    function fadeAllAudio(fadeTime) {
        fadeTime = fadeTime || 1.0;
        for (const name of Object.keys(audioVoices)) {
            stopAudioVoice(name, fadeTime);
        }
    }

    function swellAudio() {
        // Subtle volume bloom on success — all active voices swell up
        if (!audioCtx) return;
        for (const name of Object.keys(audioVoices)) {
            const v = audioVoices[name];
            if (v && v.active && v.gain) {
                const now = audioCtx.currentTime;
                v.gain.gain.cancelScheduledValues(now);
                v.gain.gain.setValueAtTime(v.gain.gain.value, now);
                v.gain.gain.linearRampToValueAtTime(0.65, now + 0.5); // bloom from 0.5 to 0.65
            }
        }
    }

    function playUiClick() {
        if (!audioInitialized) initAudio();
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(520, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(340, audioCtx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.10, audioCtx.currentTime + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.10);
        osc.connect(gain);
        gain.connect(audioMaster);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.11);
    }

    // Track previous alignment state to detect transitions
    let prevFingerOk = false;
    let prevPalmOk = false;
    let prevThumbOk = false;
    let audioFadingOut = false; // prevent repeated fade calls

    function updateAudio(fOk, pOk, tOk, phase) {
        // Only play audio during active phases
        if (phase === 'waiting') {
            if (activeAudioZones().length > 0) fadeAllAudio(0.5);
            prevFingerOk = false; prevPalmOk = false; prevThumbOk = false;
            audioFadingOut = false;
            return;
        }

        // Grace period: fade existing slowly (3 seconds dissolve)
        if (state.graceTimer > 0) {
            if (!audioFadingOut && activeAudioZones().length > 0) {
                fadeAllAudio(3.0);
                audioFadingOut = true;
            }
            prevFingerOk = false; prevPalmOk = false; prevThumbOk = false;
            return;
        }
        audioFadingOut = false;

        // Finger zone
        if (fOk && !prevFingerOk) startAudioVoice('fingers');
        if (!fOk && prevFingerOk && phase === 'orienting') stopAudioVoice('fingers', 0.4);

        // Palm zone
        if (pOk && !prevPalmOk) startAudioVoice('palm');
        if (!pOk && prevPalmOk && phase === 'orienting') stopAudioVoice('palm', 0.4);

        // Thumb zone (only during committing/locked)
        if (tOk && !prevThumbOk && (phase === 'committing' || phase === 'locked'))
            startAudioVoice('thumb');
        if (!tOk && prevThumbOk && phase === 'committing')
            stopAudioVoice('thumb', 0.4);

        // Paused: keep chord sustaining, it will fade on next generateRound via grace
        // Locked → paused: chord stays

        prevFingerOk = fOk;
        prevPalmOk = pOk;
        prevThumbOk = tOk;
    }

    /* ═══════════════════════════════════════════════════════════
       COLOR / PULSE HELPERS
    ═══════════════════════════════════════════════════════════ */
    const _tmpCol = new THREE.Color();
    const _tmpCol2 = new THREE.Color();
    const _tmpCol3 = new THREE.Color();
    function lerpC(a, b, t, target) { return (target || _tmpCol).copy(a).lerp(b, t); }

    function pulseMultiplier(t, time) {
        if (t < 0.3) return 1.0;
        const freq = 1.0 + t * 3.0;
        const amp = 0.2 + t * 0.2;
        return 1.0 - amp + amp * (0.5 + 0.5 * Math.sin(time * freq * Math.PI * 2));
    }

    function setArrowColor(arrow, color, intensity) {
        arrow.cone.material.color.copy(color);
        arrow.cone.material.emissive.copy(color);
        arrow.cone.material.emissiveIntensity = 0.2 + intensity * 0.8;
        arrow.line.material.color.copy(color);
    }

    // Zone colors: base color → green snap when aligned
    function getFingerColor(ft, aligned, scaf) {
        if (aligned) return cGreenBright;
        if (scaf) return lerpC(cDim, cCyan, 0.3 + ft * 0.7, _tmpCol);
        return lerpC(cNeutral, cCyan, ft, _tmpCol);
    }

    function getPalmColor(pt, aligned, scaf) {
        if (aligned) return cGreenBright;
        if (scaf) return lerpC(cDim, cAmber, 0.3 + pt * 0.7, _tmpCol2);
        return lerpC(cNeutral, cAmber, pt, _tmpCol2);
    }

    function getThumbColor(tt, aligned, scaf) {
        if (aligned) return cGreenBright;
        if (scaf) return lerpC(cDim, cGreen, 0.15 + tt * 0.85, _tmpCol3);
        return lerpC(cNeutral, cGreen, tt, _tmpCol3);
    }

    function getZoneColor(jointName, ft, pt, tt, fOk, pOk, tOk, scaf) {
        if (FINGER_JOINTS.has(jointName)) return getFingerColor(ft, fOk, scaf);
        if (THUMB_JOINTS.has(jointName)) return getThumbColor(tt, tOk, scaf);
        return getPalmColor(pt, pOk, scaf);
    }

    function getZoneAligned(jointName, fOk, pOk, tOk) {
        if (FINGER_JOINTS.has(jointName)) return fOk;
        if (THUMB_JOINTS.has(jointName)) return tOk;
        return pOk;
    }

    function getZoneT(jn, ft, pt, tt) {
        if (FINGER_JOINTS.has(jn)) return ft;
        if (THUMB_JOINTS.has(jn)) return tt;
        return pt;
    }

    function getBoneZone(a, b) {
        if (FINGER_JOINTS.has(a) || FINGER_JOINTS.has(b)) return 'finger';
        if (THUMB_JOINTS.has(a) || THUMB_JOINTS.has(b)) return 'thumb';
        return 'palm';
    }

    /* ═══════════════════════════════════════════════════════════
       VISUAL UPDATES — pre-allocated temp vectors
    ═══════════════════════════════════════════════════════════ */
    const _boneMid = new THREE.Vector3();
    const _boneDir = new THREE.Vector3();

    function updateTubeHand(ft, pt, tt, fOk, pOk, tOk, scaf, show, time) {
        if (!show) {
            for (const n in tubeJoints) tubeJoints[n].visible = false;
            for (const b of tubeBones) b.mesh.visible = false;
            for (const w of palmWebs) w.mesh.visible = false;
            return;
        }

        const pF = fOk ? 1.0 : pulseMultiplier(ft, time);
        const pP = pOk ? 1.0 : pulseMultiplier(pt, time);
        const pT = tOk ? 1.0 : pulseMultiplier(tt, time);

        for (const name of JOINT_NAMES) {
            const m = tubeJoints[name];
            m.position.copy(sp[name]); m.visible = true;
            const col = getZoneColor(name, ft, pt, tt, fOk, pOk, tOk, scaf);
            const aligned = getZoneAligned(name, fOk, pOk, tOk);
            const zt = getZoneT(name, ft, pt, tt);
            const p = FINGER_JOINTS.has(name) ? pF : THUMB_JOINTS.has(name) ? pT : pP;
            m.material.color.copy(col);
            m.material.emissive.copy(col);
            m.material.emissiveIntensity = aligned ? 0.9 : (0.15 + zt * 0.7) * p;
        }

        for (const b of tubeBones) {
            const pA = sp[b.a], pB = sp[b.b];
            _boneMid.lerpVectors(pA, pB, 0.5);
            _boneDir.subVectors(pB, pA);
            const len = _boneDir.length();
            if (len < 0.001) { b.mesh.visible = false; continue; }
            _boneDir.divideScalar(len); // normalize without creating new vec
            b.mesh.position.copy(_boneMid);
            b.mesh.quaternion.setFromUnitVectors(UP, _boneDir);
            b.mesh.scale.set(1, len, 1);
            b.mesh.visible = true;
            const zone = getBoneZone(b.a, b.b);
            const col = getZoneColor(b.a, ft, pt, tt, fOk, pOk, tOk, scaf);
            const aligned = zone === 'finger' ? fOk : zone === 'thumb' ? tOk : pOk;
            const zt = zone === 'finger' ? ft : zone === 'thumb' ? tt : pt;
            const p = zone === 'finger' ? pF : zone === 'thumb' ? pT : pP;
            b.mesh.material.color.copy(col);
            b.mesh.material.emissive.copy(col);
            b.mesh.material.emissiveIntensity = aligned ? 0.8 : (0.1 + zt * 0.6) * p;
        }

        for (const w of palmWebs) {
            const pos = w.mesh.geometry.attributes.position;
            pos.setXYZ(0, sp[w.a].x, sp[w.a].y, sp[w.a].z);
            pos.setXYZ(1, sp[w.b].x, sp[w.b].y, sp[w.b].z);
            pos.setXYZ(2, sp[w.c].x, sp[w.c].y, sp[w.c].z);
            pos.needsUpdate = true;
            w.mesh.visible = true;
            const col = getPalmColor(pt, pOk, scaf);
            w.mesh.material.color.copy(col);
            w.mesh.material.emissive.copy(col);
            w.mesh.material.emissiveIntensity = pOk ? 0.6 : (0.08 + pt * 0.4) * pP;
        }
    }

    function updateOverlayArrows(hd, ft, pt, tt, fOk, pOk, tOk, scaf, show, time, phase) {
        // No overlay arrows in prediction mode — only tube hand glow
        if (!show || !hd || !scaf) {
            fingerArrows.forEach(a => a.visible = false);
            thumbOverlay.visible = false; palmOverlay.visible = false;
            fingerLabels.forEach(l => l.visible = false);
            thumbLbl.visible = false; palmLbl.visible = false;
            return;
        }

        const pF = fOk ? 1.0 : pulseMultiplier(ft, time);
        const pT = tOk ? 1.0 : pulseMultiplier(tt, time);
        const pP = pOk ? 1.0 : pulseMultiplier(pt, time);

        const fCol = getFingerColor(ft, fOk, scaf);
        const pCol = getPalmColor(pt, pOk, scaf);
        const tCol = getThumbColor(tt, tOk, scaf);

        // Finger arrows (only during orienting when hand is flat)
        const showFingers = phase === 'orienting';
        FINGER_DEFS.forEach((f, i) => {
            const arrow = fingerArrows[i];
            if (showFingers) {
                arrow.position.copy(sp[f.distal]);
                arrow.setDirection(hd.fingerDirs[i]);
                arrow.setLength(0.05, 0.014, 0.008);
                setArrowColor(arrow, fCol, fOk ? 1.0 : ft * pF);
                arrow.visible = true;
                if (scaf) {
                    fingerLabels[i].position.copy(sp[f.tip]).addScaledVector(hd.fingerDirs[i], 0.045);
                    fingerLabels[i].visible = true;
                } else { fingerLabels[i].visible = false; }
            } else {
                arrow.visible = false;
                fingerLabels[i].visible = false;
            }
        });

        // Thumb arrow (visible during committing + locked + paused)
        const showThumb = phase === 'committing' || phase === 'locked' || phase === 'paused';
        if (showThumb) {
            thumbOverlay.position.copy(sp[THUMB_DEF.distal]);
            thumbOverlay.setDirection(hd.thumbDir);
            thumbOverlay.setLength(0.055, 0.016, 0.009);
            setArrowColor(thumbOverlay, tCol, tOk ? 1.0 : tt * pT);
            thumbOverlay.visible = true;
            if (scaf) {
                thumbLbl.position.copy(sp[THUMB_DEF.tip]).addScaledVector(hd.thumbDir, 0.045);
                thumbLbl.visible = true;
            } else { thumbLbl.visible = false; }
        } else {
            thumbOverlay.visible = false;
            thumbLbl.visible = false;
        }

        // Palm arrow
        if (showFingers) {
            palmOverlay.position.copy(hd.palmCenter);
            palmOverlay.setDirection(hd.palmNormal);
            palmOverlay.setLength(0.07, 0.020, 0.012);
            setArrowColor(palmOverlay, pCol, pOk ? 1.0 : pt * pP);
            palmOverlay.visible = true;
            if (scaf) {
                palmLbl.position.copy(hd.palmCenter).addScaledVector(hd.palmNormal, 0.12);
                palmLbl.visible = true;
            } else { palmLbl.visible = false; }
        } else {
            palmOverlay.visible = false;
            palmLbl.visible = false;
        }
    }

    function updateSceneArrows(ft, pt, tt, fOk, pOk, time) {
        // v arrow responds to finger alignment
        const vP = fOk ? 1.0 : pulseMultiplier(ft, time);
        const vE = fOk ? SCENE_ARROW_MAX : SCENE_ARROW_BASE + ft * (SCENE_ARROW_MAX - SCENE_ARROW_BASE);
        setSceneArrowEmissive(vArrow, vE * vP);

        // B arrow responds to palm alignment
        const bP = pOk ? 1.0 : pulseMultiplier(pt, time);
        const bE = pOk ? SCENE_ARROW_MAX : SCENE_ARROW_BASE + pt * (SCENE_ARROW_MAX - SCENE_ARROW_BASE);
        setSceneArrowEmissive(bArrow, bE * bP);

        // F arrow
        if (fArrow.visible) {
            setSceneArrowEmissive(fArrow, SCENE_ARROW_MAX);
        }
    }

    /* ═══════════════════════════════════════════════════════════
       VR INIT
    ═══════════════════════════════════════════════════════════ */
    const vrBtn = document.getElementById('enter-vr');
    const statusEl = document.getElementById('status');
    const overlayEl = document.getElementById('overlay');
    async function initVR() {
        if (!navigator.xr) {
            vrBtn.textContent = 'WebXR Not Available';
            statusEl.textContent = 'Browser does not support WebXR.'; return;
        }
        const ok = await navigator.xr.isSessionSupported('immersive-vr');
        if (!ok) {
            vrBtn.textContent = 'VR Not Supported';
            statusEl.textContent = 'No VR headset detected.'; return;
        }
        vrBtn.disabled = false; vrBtn.textContent = 'ENTER VR';
        vrBtn.addEventListener('click', async () => {
            try {
                const session = await navigator.xr.requestSession('immersive-vr', {
                    optionalFeatures: ['hand-tracking', 'local-floor']
                });
                session.addEventListener('end', () => {
                    overlayEl.style.display = 'flex';
                    statusEl.textContent = '';
                    vrBtn.disabled = false;
                    vrBtn.textContent = 'ENTER VR';
                    state.phase = 'waiting';
                    state.handTracked = false;
                    state.confirmedRightIdx = -1;
                    lastHandData = null;
                    wasPinching = false;
                    fadeAllAudio(0.2);
                });
                renderer.xr.setReferenceSpaceType('local-floor');
                await renderer.xr.setSession(session);
                overlayEl.style.display = 'none';
                state.phase = 'waiting';
                initAudio(); // User gesture context for Web Audio
            } catch (err) { statusEl.textContent = `VR failed: ${err.message}`; }
        });
    }
    initVR();

    /* ═══════════════════════════════════════════════════════════
       MAIN LOOP
    ═══════════════════════════════════════════════════════════ */
    const clock = new THREE.Clock();
    let elapsed = 0;

    renderer.setAnimationLoop(() => {
        const dt = clock.getDelta();
        elapsed += dt;
        const hd = readRightHand();
        if (skipFlash > 0) skipFlash = Math.max(0, skipFlash - dt);

        // Fist shake: mode toggle (only when NOT in committing phase to avoid conflict)
        if (state.phase !== 'committing' && updateFistShake(dt))
            state.mode = state.mode === 'scaffolded' ? 'prediction' : 'scaffolded';

        // Pinch
        skipHover = isSkipButtonTouched();
        const skipTapped = skipHover && !wasSkipTouching;
        wasSkipTouching = skipHover;
        const isPinching = detectPinch();
        const pinchTriggered = isPinching && !wasPinching;
        wasPinching = isPinching;
        const canDragHud = isHudDraggableTouched();
        const pinchPoint = getPinchWorldPoint();
        if (pinchTriggered && canDragHud && pinchPoint && !skipHover) {
            hudDragging = true;
            hudDragOffset.copy(hudMesh.position).sub(pinchPoint);
        }
        if (hudDragging) {
            if (isPinching && pinchPoint) {
                hudMesh.position.copy(pinchPoint).add(hudDragOffset);
            } else {
                hudDragging = false;
            }
        }

        /* ── PHASE LOGIC ── */
        if (state.phase === 'waiting' && state.handTracked) generateRound();

        // Grace period countdown
        if (state.graceTimer > 0) {
            state.graceTimer -= dt;
        }

        if (state.phase === 'orienting' && hd && state.graceTimer <= 0) {
            // Use metacarpal→proximal direction for finger alignment
            // These bones don't rotate during curl — alignment is stable
            state.fingerAlign = hd.avgFingerBase.dot(state.currentV);
            state.palmAlign   = hd.palmNormal.dot(state.currentB);
            state.fingerOk = state.fingerAlign >= ALIGN_THRESHOLD;
            state.palmOk   = state.palmAlign   >= ALIGN_THRESHOLD;

            // Both aligned + fist → commit
            if (state.fingerOk && state.palmOk && state.isFist) {
                state.phase = 'committing';
            }
        }

        if (state.phase === 'committing' && hd) {
            // Keep checking finger/palm with stable base directions
            state.fingerAlign = hd.avgFingerBase.dot(state.currentV);
            state.palmAlign   = hd.palmNormal.dot(state.currentB);
            state.fingerOk = state.fingerAlign >= ALIGN_THRESHOLD;
            state.palmOk   = state.palmAlign   >= ALIGN_THRESHOLD;

            // Check thumb
            state.thumbAlign = hd.thumbDir.dot(state.expectedF);
            state.thumbOk = state.thumbAlign >= ALIGN_THRESHOLD;

            // If they open their hand or lose alignment, go back
            if (!state.isFist || !state.fingerOk || !state.palmOk) {
                state.phase = 'orienting';
                state.thumbOk = false;
            }

            // Thumb aligned → locked!
            if (state.thumbOk && state.isFist && state.fingerOk && state.palmOk) {
                state.phase = 'locked';
                state.score.correct++;
                state.score.total++;
                state.streak++;
                fArrow.visible = true;
                fLblScene.visible = true;
                launchParticle(vectorOrigin.clone(), state.expectedF);
                swellAudio(); // volume bloom on success
                setTimeout(() => { if (state.phase === 'locked') state.phase = 'paused'; }, 1500);
            }
        }

        if ((state.phase === 'orienting' || state.phase === 'committing') && skipTapped && !hudDragging) {
            skipRound();
        } else if (state.phase === 'paused' && pinchTriggered && !hudDragging) {
            if (state.difficulty === 'cardinal' && state.streak >= STREAK_UNLOCK)
                state.difficulty = 'arbitrary';
            generateRound();
        }

        // Tether
        // Tether vectors and HUD
        if (state.phase === 'orienting' || state.phase === 'committing' ||
            state.phase === 'locked' || state.phase === 'paused') {
            tetherVectors(dt);
            tetherHud(dt);
        }

        // Visual params
        const scaf = state.mode === 'scaffolded';
        const rng = ALIGN_THRESHOLD - 0.3;
        const active = state.phase === 'orienting' || state.phase === 'committing' ||
                       state.phase === 'locked' || state.phase === 'paused';

        let ft = 0, pt = 0, tt = 0;
        if (active) {
            ft = Math.max(0, Math.min(1, (state.fingerAlign - 0.3) / rng));
            pt = Math.max(0, Math.min(1, (state.palmAlign   - 0.3) / rng));
            tt = Math.max(0, Math.min(1, (state.thumbAlign  - 0.3) / rng));
        }

        let fOk = state.fingerOk && active;
        let pOk = state.palmOk && active;
        let tOk = state.thumbOk && active;

        // Grace period: force neutral hand
        if (state.graceTimer > 0) {
            ft = 0; pt = 0; tt = 0;
            fOk = false; pOk = false; tOk = false;
        }

        // Override during committing (finger/palm frozen green) and locked/paused
        if (state.phase === 'committing') {
            ft = 1; pt = 1;
        }
        if (state.phase === 'locked' || state.phase === 'paused') {
            ft = 1; pt = 1; tt = 1;
        }

        // Audio feedback
        updateAudio(fOk, pOk, tOk, state.phase);

        updateTubeHand(ft, pt, tt, fOk, pOk, tOk, scaf, state.handTracked, elapsed);

        const showOverlay = state.handTracked && active;
        updateOverlayArrows(hd || lastHandData, ft, pt, tt, fOk, pOk, tOk, scaf, showOverlay, elapsed, state.phase);

        if (active) updateSceneArrows(ft, pt, tt, fOk, pOk, elapsed);
        else {
            setSceneArrowEmissive(vArrow, SCENE_ARROW_BASE);
            setSceneArrowEmissive(bArrow, SCENE_ARROW_BASE);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.mesh.position.addScaledVector(p.vel, dt);
            p.life -= dt;
            p.mesh.material.opacity = Math.max(0, p.life / 2);
            if (p.life <= 0) {
                scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
                particles.splice(i, 1);
            }
        }

        if (renderer.xr.isPresenting) {
            camera.getWorldPosition(_hudLookAtPos);
            hudMesh.lookAt(_hudLookAtPos);
        }

        drawHUD();
        renderer.render(scene, camera);
    });

    addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });
    </script>
</body>
</html>
