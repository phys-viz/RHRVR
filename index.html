<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Right Hand Rule VR</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e1a; color: #c0c8d8;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden; width: 100vw; height: 100vh;
        }
        #overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }
        #title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 22px; color: #00e5ff;
            letter-spacing: 3px; margin-bottom: 8px;
        }
        #subtitle { font-size: 15px; color: #607080; margin-bottom: 30px; }
        #enter-vr {
            pointer-events: auto; padding: 14px 36px;
            font-family: 'Rajdhani', sans-serif; font-weight: 700;
            font-size: 18px; letter-spacing: 1px;
            background: linear-gradient(135deg, #00e5ff, #00b8d4);
            color: #0a0e1a; border: none; border-radius: 4px;
            cursor: pointer; text-transform: uppercase; transition: all 0.2s;
        }
        #enter-vr:hover { transform: scale(1.05); }
        #enter-vr:disabled { background: #2a3040; color: #556; cursor: not-allowed; transform: none; }
        #status { margin-top: 16px; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #ff5252; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="title">RIGHT HAND RULE VR</div>
        <div id="subtitle">Learn the cross product with your actual hand</div>
        <button id="enter-vr" disabled>Checking VR...</button>
        <div id="status"></div>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js" } }
    </script>

    <script type="module">
    import * as THREE from 'three';

    /* ═══════════════════════════════════════════════════════════
       PALETTE
    ═══════════════════════════════════════════════════════════ */
    const C = {
        bg: 0x0a0e1a, grid: 0x1a2236, gridCent: 0x243050,
        cyan: 0x00a8c8, amber: 0xe08820, green: 0x30b870,
        red: 0xff5252, dim: 0x222a38, neutral: 0x556677, joint: 0x3a6a80,
    };
    const cCyan = new THREE.Color(C.cyan);
    const cAmber = new THREE.Color(C.amber);
    const cGreen = new THREE.Color(C.green);
    const cDim = new THREE.Color(C.dim);
    const cNeutral = new THREE.Color(C.neutral);
    const cJoint = new THREE.Color(C.joint);
    const UP = new THREE.Vector3(0, 1, 0);

    /* ═══════════════════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════════════════ */
    const state = {
        mode: 'scaffolded', phase: 'waiting',
        currentV: new THREE.Vector3(), currentB: new THREE.Vector3(),
        expectedF: new THREE.Vector3(),
        fingerAlign: 0, palmAlign: 0, thumbAlign: 0,
        fingerOk: false, palmOk: false, thumbOk: false,
        lockTimer: 0,
        score: { correct: 0, total: 0 },
        round: 0, difficulty: 'cardinal', streak: 0,
        handTracked: false, confirmedRightIdx: -1,
    };
    const ALIGN_THRESHOLD = 0.75;
    const LOCK_HOLD = 0.6;
    const STREAK_UNLOCK = 4;

    /* ═══════════════════════════════════════════════════════════
       SCENE
    ═══════════════════════════════════════════════════════════ */
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(C.bg);
    scene.fog = new THREE.FogExp2(C.bg, 0.08);
    const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.05, 50);
    camera.position.set(0, 1.6, 0);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.xr.enabled = true;
    renderer.outputEncoding = THREE.sRGBEncoding;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x334466, 0.6));
    const pt1 = new THREE.PointLight(C.cyan, 0.6, 12);
    pt1.position.set(0, 3, 0); scene.add(pt1);
    const pt2 = new THREE.PointLight(C.amber, 0.25, 8);
    pt2.position.set(2, 2, -2); scene.add(pt2);
    const grid = new THREE.GridHelper(20, 40, C.gridCent, C.grid);
    grid.material.transparent = true; grid.material.opacity = 0.35;
    scene.add(grid);

    /* ═══════════════════════════════════════════════════════════
       HAND SETUP — register both, render only right
    ═══════════════════════════════════════════════════════════ */
    // DO NOT add xrHands to scene — we draw our own tube hand
    const xrHands = [renderer.xr.getHand(0), renderer.xr.getHand(1)];

    const JOINT_NAMES = [
        'wrist',
        'thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip',
        'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
        'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
        'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
        'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
    ];

    const BONES = [
        ['wrist','thumb-metacarpal'],['thumb-metacarpal','thumb-phalanx-proximal'],
        ['thumb-phalanx-proximal','thumb-phalanx-distal'],['thumb-phalanx-distal','thumb-tip'],
        ['wrist','index-finger-metacarpal'],['index-finger-metacarpal','index-finger-phalanx-proximal'],
        ['index-finger-phalanx-proximal','index-finger-phalanx-intermediate'],
        ['index-finger-phalanx-intermediate','index-finger-phalanx-distal'],
        ['index-finger-phalanx-distal','index-finger-tip'],
        ['wrist','middle-finger-metacarpal'],['middle-finger-metacarpal','middle-finger-phalanx-proximal'],
        ['middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate'],
        ['middle-finger-phalanx-intermediate','middle-finger-phalanx-distal'],
        ['middle-finger-phalanx-distal','middle-finger-tip'],
        ['wrist','ring-finger-metacarpal'],['ring-finger-metacarpal','ring-finger-phalanx-proximal'],
        ['ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate'],
        ['ring-finger-phalanx-intermediate','ring-finger-phalanx-distal'],
        ['ring-finger-phalanx-distal','ring-finger-tip'],
        ['wrist','pinky-finger-metacarpal'],['pinky-finger-metacarpal','pinky-finger-phalanx-proximal'],
        ['pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate'],
        ['pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal'],
        ['pinky-finger-phalanx-distal','pinky-finger-tip'],
        // Cross-palm bones
        ['index-finger-metacarpal','middle-finger-metacarpal'],
        ['middle-finger-metacarpal','ring-finger-metacarpal'],
        ['ring-finger-metacarpal','pinky-finger-metacarpal'],
    ];

    // Palm webbing triangles (between metacarpals and wrist)
    const PALM_TRIS = [
        ['wrist', 'index-finger-metacarpal', 'middle-finger-metacarpal'],
        ['wrist', 'middle-finger-metacarpal', 'ring-finger-metacarpal'],
        ['wrist', 'ring-finger-metacarpal', 'pinky-finger-metacarpal'],
        ['wrist', 'thumb-metacarpal', 'index-finger-metacarpal'],
    ];

    const FINGER_JOINTS = new Set([
        'index-finger-metacarpal','index-finger-phalanx-proximal','index-finger-phalanx-intermediate','index-finger-phalanx-distal','index-finger-tip',
        'middle-finger-metacarpal','middle-finger-phalanx-proximal','middle-finger-phalanx-intermediate','middle-finger-phalanx-distal','middle-finger-tip',
        'ring-finger-metacarpal','ring-finger-phalanx-proximal','ring-finger-phalanx-intermediate','ring-finger-phalanx-distal','ring-finger-tip',
        'pinky-finger-metacarpal','pinky-finger-phalanx-proximal','pinky-finger-phalanx-intermediate','pinky-finger-phalanx-distal','pinky-finger-tip',
    ]);
    const THUMB_JOINTS = new Set(['thumb-metacarpal','thumb-phalanx-proximal','thumb-phalanx-distal','thumb-tip']);

    const FINGER_DEFS = [
        { distal: 'index-finger-phalanx-distal', tip: 'index-finger-tip' },
        { distal: 'middle-finger-phalanx-distal', tip: 'middle-finger-tip' },
        { distal: 'ring-finger-phalanx-distal', tip: 'ring-finger-tip' },
        { distal: 'pinky-finger-phalanx-distal', tip: 'pinky-finger-tip' },
    ];
    const THUMB_DEF = { distal: 'thumb-phalanx-distal', tip: 'thumb-tip' };

    const jp = {};
    for (const n of JOINT_NAMES) jp[n] = new THREE.Vector3();

    /* ═══════════════════════════════════════════════════════════
       TUBE HAND — polished with palm webbing
    ═══════════════════════════════════════════════════════════ */
    const tubeGroup = new THREE.Group();
    scene.add(tubeGroup);

    function jr(name) {
        if (name === 'wrist') return 0.012;
        if (name.includes('metacarpal')) return 0.009;
        if (name.includes('proximal')) return 0.008;
        if (name.includes('intermediate')) return 0.007;
        if (name.includes('distal')) return 0.0065;
        if (name.includes('tip')) return 0.006;
        return 0.007;
    }

    function br(a, b) {
        if (a === 'wrist' || b === 'wrist') return 0.006;
        if (a.includes('metacarpal') && b.includes('metacarpal')) return 0.005;
        if (a.includes('metacarpal') || b.includes('metacarpal')) return 0.005;
        if (a.includes('proximal') || b.includes('proximal')) return 0.0045;
        return 0.004;
    }

    // Joint spheres
    const tubeJoints = {};
    for (const name of JOINT_NAMES) {
        const geo = new THREE.SphereGeometry(jr(name), 12, 12);
        const mat = new THREE.MeshStandardMaterial({
            color: C.joint, emissive: C.joint, emissiveIntensity: 0.2,
            roughness: 0.4, metalness: 0.1, transparent: true, opacity: 0.92,
        });
        const m = new THREE.Mesh(geo, mat);
        m.visible = false;
        tubeGroup.add(m);
        tubeJoints[name] = m;
    }

    // Bone cylinders
    const tubeBones = BONES.map(([a, b]) => {
        const r = br(a, b);
        const geo = new THREE.CylinderGeometry(r, r * 0.9, 1, 10, 1); // slight taper
        const mat = new THREE.MeshStandardMaterial({
            color: C.joint, emissive: C.joint, emissiveIntensity: 0.15,
            roughness: 0.4, metalness: 0.1, transparent: true, opacity: 0.88,
        });
        const m = new THREE.Mesh(geo, mat);
        m.visible = false;
        tubeGroup.add(m);
        return { mesh: m, a, b };
    });

    // Palm webbing (triangle meshes)
    const palmWebs = PALM_TRIS.map(([a, b, c]) => {
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(9); // 3 verts × 3 components
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        // Double-sided so it's visible from both angles
        const mat = new THREE.MeshStandardMaterial({
            color: C.joint, emissive: C.joint, emissiveIntensity: 0.1,
            roughness: 0.5, transparent: true, opacity: 0.45,
            side: THREE.DoubleSide,
        });
        const m = new THREE.Mesh(geo, mat);
        m.visible = false;
        tubeGroup.add(m);
        return { mesh: m, a, b, c };
    });

    /* ═══════════════════════════════════════════════════════════
       OVERLAY ARROWS
    ═══════════════════════════════════════════════════════════ */
    function createOverlayArrow(len, headLen, headW) {
        const arrow = new THREE.ArrowHelper(
            new THREE.Vector3(0,1,0), new THREE.Vector3(),
            len, C.neutral, headLen, headW
        );
        arrow.cone.material = new THREE.MeshStandardMaterial({
            color: C.neutral, emissive: C.neutral, emissiveIntensity: 0.3,
            roughness: 0.4, transparent: true, opacity: 0.9,
        });
        arrow.line.material = new THREE.LineBasicMaterial({
            color: C.neutral, transparent: true, opacity: 0.9,
        });
        arrow.visible = false;
        scene.add(arrow);
        return arrow;
    }

    const fingerArrows = FINGER_DEFS.map(() => createOverlayArrow(0.05, 0.014, 0.008));
    const thumbOverlay = createOverlayArrow(0.055, 0.016, 0.009);
    const palmOverlay  = createOverlayArrow(0.07, 0.020, 0.012);

    // Labels
    function createLabel(text, cssColor) {
        const cv = document.createElement('canvas');
        cv.width = 128; cv.height = 64;
        const ctx = cv.getContext('2d');
        ctx.font = 'bold 40px Rajdhani, sans-serif';
        ctx.fillStyle = cssColor;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 64, 32);
        const tex = new THREE.CanvasTexture(cv);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sp = new THREE.Sprite(mat);
        sp.scale.set(0.04, 0.02, 1);
        sp.visible = false;
        scene.add(sp);
        return sp;
    }

    const fingerLabels = FINGER_DEFS.map(() => createLabel('v', '#00a8c8'));
    const thumbLbl = createLabel('F', '#30b870');
    const palmLbl = createLabel('B', '#e08820');

    /* ═══════════════════════════════════════════════════════════
       SCENE VECTORS (v, B, F)
    ═══════════════════════════════════════════════════════════ */
    const vectorOrigin = new THREE.Vector3(0, 1.3, -0.8);
    const ARROW_LEN = 0.35;

    // Custom arrow materials so we can animate emissive
    function makeSceneArrow(color) {
        const arrow = new THREE.ArrowHelper(
            new THREE.Vector3(1, 0, 0), vectorOrigin.clone(),
            ARROW_LEN, color, 0.06, 0.03
        );
        // Replace with emissive materials
        arrow.cone.material = new THREE.MeshStandardMaterial({
            color: color, emissive: color, emissiveIntensity: 0.3,
            roughness: 0.3, transparent: true, opacity: 0.95,
        });
        arrow.line.material = new THREE.LineBasicMaterial({
            color: color, transparent: true, opacity: 0.95,
        });
        scene.add(arrow);
        return arrow;
    }

    const vArrow = makeSceneArrow(C.cyan);
    const bArrow = makeSceneArrow(C.amber);
    const fArrow = makeSceneArrow(C.green);
    fArrow.visible = false;

    // Scene arrow base emissive intensity (we'll animate this)
    const SCENE_ARROW_BASE_EMISSIVE = 0.3;
    const SCENE_ARROW_MAX_EMISSIVE  = 1.2;

    function createVecLabel(text, cssColor) {
        const cv = document.createElement('canvas');
        cv.width = 128; cv.height = 64;
        const ctx = cv.getContext('2d');
        ctx.font = 'bold 44px Share Tech Mono, monospace';
        ctx.fillStyle = cssColor;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(text, 64, 32);
        const tex = new THREE.CanvasTexture(cv);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
        const sp = new THREE.Sprite(mat);
        sp.scale.set(0.08, 0.04, 1);
        scene.add(sp);
        return sp;
    }

    const vLbl = createVecLabel('v', '#00a8c8');
    const bLblScene = createVecLabel('B', '#e08820');
    const fLblScene = createVecLabel('F', '#30b870');
    fLblScene.visible = false;

    function positionVecLabels() {
        const off = 0.43;
        vLbl.position.copy(vectorOrigin).addScaledVector(state.currentV, off);
        bLblScene.position.copy(vectorOrigin).addScaledVector(state.currentB, off);
        fLblScene.position.copy(vectorOrigin).addScaledVector(state.expectedF, off);
    }

    /* ═══════════════════════════════════════════════════════════
       HUD
    ═══════════════════════════════════════════════════════════ */
    const hudCv = document.createElement('canvas');
    hudCv.width = 512; hudCv.height = 400;
    const hudCtx = hudCv.getContext('2d');
    const hudTex = new THREE.CanvasTexture(hudCv);
    hudTex.minFilter = THREE.LinearFilter;
    const hudMesh = new THREE.Mesh(
        new THREE.PlaneGeometry(0.40, 0.32),
        new THREE.MeshBasicMaterial({ map: hudTex, transparent: true, opacity: 0.95, side: THREE.DoubleSide })
    );
    hudMesh.position.set(-0.55, 1.55, -0.60);
    scene.add(hudMesh);

    function drawHUD() {
        const ctx = hudCtx;
        ctx.clearRect(0, 0, 512, 400);

        ctx.fillStyle = 'rgba(14, 20, 34, 0.92)';
        ctx.beginPath(); ctx.roundRect(6, 6, 500, 388, 12); ctx.fill();
        ctx.strokeStyle = '#2a4060'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.roundRect(6, 6, 500, 388, 12); ctx.stroke();

        ctx.font = '700 30px Rajdhani, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ffffff';
        ctx.fillText('RIGHT HAND RULE', 256, 44);

        ctx.font = '600 24px Share Tech Mono, monospace';
        ctx.fillStyle = state.mode === 'scaffolded' ? '#e08820' : '#30b870';
        ctx.fillText(state.mode === 'scaffolded' ? '[ SCAFFOLDED ]' : '[ PREDICTION ]', 256, 78);

        ctx.strokeStyle = '#2a4060'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(40, 94); ctx.lineTo(472, 94); ctx.stroke();

        ctx.font = '22px Share Tech Mono, monospace';
        ctx.fillStyle = '#8899aa';
        ctx.fillText(`Round ${state.round}`, 256, 126);

        ctx.font = '700 38px Rajdhani, sans-serif';
        ctx.fillStyle = '#f0f4f8';
        ctx.fillText(`${state.score.correct} / ${state.score.total}`, 256, 168);

        ctx.font = '18px Share Tech Mono, monospace';
        ctx.fillStyle = '#667788';
        ctx.fillText(state.difficulty === 'cardinal' ? 'Cardinal axes' : 'Arbitrary 3D', 256, 200);

        ctx.font = '600 26px Rajdhani, sans-serif';
        if (state.phase === 'waiting') {
            ctx.fillStyle = '#8899aa';
            ctx.fillText('Show your right hand to begin', 256, 252);
        } else if (state.phase === 'orienting') {
            ctx.fillStyle = '#c0d0e0';
            ctx.fillText('Orient your right hand:', 256, 242);
            ctx.font = '22px Rajdhani, sans-serif';
            ctx.fillStyle = '#00a8c8';
            ctx.fillText('Fingers \u2192 v', 256, 272);
            ctx.fillStyle = '#e08820';
            ctx.fillText('Palm faces \u2192 B', 256, 298);
            ctx.fillStyle = '#30b870';
            ctx.fillText('Thumb \u2192 F', 256, 324);
            if (state.lockTimer > 0) {
                ctx.font = '700 24px Rajdhani, sans-serif';
                ctx.fillStyle = '#30b870';
                ctx.fillText('\u25cf  Hold steady...', 256, 358);
            }
        } else if (state.phase === 'locked') {
            ctx.fillStyle = '#30b870';
            ctx.font = 'bold 32px Rajdhani, sans-serif';
            ctx.fillText('\u2713  CORRECT!', 256, 252);
            ctx.font = '22px Rajdhani, sans-serif';
            ctx.fillStyle = '#c0d0e0';
            ctx.fillText('F = v \u00d7 B', 256, 286);
        } else if (state.phase === 'paused') {
            ctx.fillStyle = '#f0f4f8';
            ctx.font = '700 28px Rajdhani, sans-serif';
            ctx.fillText('\u2713  CORRECT!', 256, 240);
            ctx.font = '24px Rajdhani, sans-serif';
            ctx.fillStyle = '#c0d0e0';
            ctx.fillText('F = v \u00d7 B', 256, 272);
            ctx.font = '22px Rajdhani, sans-serif';
            ctx.fillStyle = '#8899aa';
            ctx.fillText('Pinch to continue', 256, 312);
        }

        ctx.font = '16px Rajdhani, sans-serif';
        ctx.fillStyle = '#445566';
        ctx.fillText('Shake fist \u2192 toggle mode', 256, 384);

        hudTex.needsUpdate = true;
    }

    /* ═══════════════════════════════════════════════════════════
       PARTICLES
    ═══════════════════════════════════════════════════════════ */
    const pGeo = new THREE.SphereGeometry(0.015, 12, 12);
    const particles = [];
    function launchParticle(origin, dir) {
        const mat = new THREE.MeshStandardMaterial({
            color: C.green, emissive: C.green, emissiveIntensity: 0.8, transparent: true,
        });
        const m = new THREE.Mesh(pGeo, mat);
        m.position.copy(origin); scene.add(m);
        particles.push({ mesh: m, vel: dir.clone().multiplyScalar(0.8), life: 2.0 });
    }

    /* ═══════════════════════════════════════════════════════════
       VECTOR GENERATION — perpendicular, filtered for comfort
    ═══════════════════════════════════════════════════════════ */
    const CARDINALS = [
        new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
        new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0),
        new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1),
    ];

    function randomPerp(v) {
        let arb = new THREE.Vector3(1, 0, 0);
        if (Math.abs(v.dot(arb)) > 0.9) arb.set(0, 1, 0);
        const perp = new THREE.Vector3().crossVectors(v, arb).normalize();
        perp.applyQuaternion(new THREE.Quaternion().setFromAxisAngle(v, Math.random() * Math.PI * 2));
        return perp;
    }

    function isComfortableV(v) {
        // Get camera gaze direction
        const camDir = new THREE.Vector3();
        camera.getWorldDirection(camDir);

        // Reject v that points too much toward user (would need fingers toward face)
        // camDir points FORWARD, so v pointing toward user = v · (-camDir) > threshold
        const towardUser = -v.dot(camDir);
        if (towardUser > 0.5) return false;

        // Reject straight down (pointing fingers at floor is awkward for tracking)
        if (v.y < -0.8) return false;

        return true;
    }

    function repositionVectors() {
        const camPos = new THREE.Vector3();
        const camDir = new THREE.Vector3();
        camera.getWorldPosition(camPos);
        camera.getWorldDirection(camDir);
        camDir.y = 0;
        if (camDir.lengthSq() < 0.001) camDir.set(0, 0, -1);
        camDir.normalize();
        vectorOrigin.copy(camPos).addScaledVector(camDir, 0.7);
        vectorOrigin.y = camPos.y - 0.2;
        vArrow.position.copy(vectorOrigin);
        bArrow.position.copy(vectorOrigin);
        fArrow.position.copy(vectorOrigin);
    }

    function generateRound() {
        state.round++;
        state.phase = 'orienting';
        state.lockTimer = 0;
        state.fingerOk = state.palmOk = state.thumbOk = false;

        repositionVectors();

        let v, b, attempts = 0;
        if (state.difficulty === 'cardinal') {
            do {
                v = CARDINALS[Math.floor(Math.random() * 6)].clone();
                attempts++;
            } while (!isComfortableV(v) && attempts < 30);
            const perps = CARDINALS.filter(c => Math.abs(c.dot(v)) < 0.1);
            b = perps[Math.floor(Math.random() * perps.length)].clone();
        } else {
            do {
                v = new THREE.Vector3(Math.random()*2-1, Math.random()*2-1, Math.random()*2-1).normalize();
                attempts++;
            } while (!isComfortableV(v) && attempts < 50);
            b = randomPerp(v);
        }

        state.currentV.copy(v);
        state.currentB.copy(b);
        state.expectedF.crossVectors(v, b).normalize();

        vArrow.setDirection(v);
        bArrow.setDirection(b);
        fArrow.setDirection(state.expectedF);
        fArrow.visible = false;
        fLblScene.visible = false;

        // Reset scene arrow emissive to base
        setSceneArrowEmissive(vArrow, SCENE_ARROW_BASE_EMISSIVE);
        setSceneArrowEmissive(bArrow, SCENE_ARROW_BASE_EMISSIVE);

        positionVecLabels();
    }

    /* ═══════════════════════════════════════════════════════════
       HAND READING — robust right-hand detection
    ═══════════════════════════════════════════════════════════ */
    function findRightHandIdx() {
        const session = renderer.xr.getSession();
        if (!session || !session.inputSources) return -1;

        // Check inputSources each frame for handedness
        for (const src of session.inputSources) {
            if (src.handedness !== 'right' || !src.hand) continue;
            // Found a right hand source — now find which getHand() index has joints
            for (let h = 0; h < 2; h++) {
                const hand = xrHands[h];
                if (hand.joints && hand.joints['wrist'] && hand.joints['index-finger-tip']) {
                    // Verify this is actually the right one by checking joint count
                    // On Quest, the hand with matching inputSource will have populated joints
                    return h;
                }
            }
        }
        return -1;
    }

    let lastHandData = null;

    function readRightHand() {
        // Re-check handedness EVERY frame until confirmed
        const detected = findRightHandIdx();
        if (detected >= 0) {
            state.confirmedRightIdx = detected;
        }

        // If we haven't found right hand yet, don't render anything
        if (state.confirmedRightIdx < 0) {
            // Try fallback: first hand with joints, but only if inputSources isn't populated yet
            const session = renderer.xr.getSession();
            const hasInputSources = session && session.inputSources && session.inputSources.length > 0;
            if (!hasInputSources) {
                for (let i = 0; i < 2; i++) {
                    if (xrHands[i].joints && xrHands[i].joints['wrist']) {
                        state.confirmedRightIdx = i;
                        break;
                    }
                }
            }
        }

        if (state.confirmedRightIdx < 0) {
            state.handTracked = false;
            return null;
        }

        const rHand = xrHands[state.confirmedRightIdx];
        if (!rHand.joints || !rHand.joints['wrist']) {
            state.handTracked = false;
            return null;
        }

        let ok = true;
        for (const name of JOINT_NAMES) {
            if (rHand.joints[name]) {
                rHand.joints[name].getWorldPosition(jp[name]);
            } else { ok = false; }
        }
        if (!ok) { state.handTracked = false; return null; }

        state.handTracked = true;

        const fingerDirs = FINGER_DEFS.map(f =>
            new THREE.Vector3().subVectors(jp[f.tip], jp[f.distal]).normalize()
        );
        const avgFinger = new THREE.Vector3();
        fingerDirs.forEach(d => avgFinger.add(d));
        avgFinger.divideScalar(fingerDirs.length).normalize();

        const thumbDir = new THREE.Vector3().subVectors(
            jp[THUMB_DEF.tip], jp[THUMB_DEF.distal]
        ).normalize();

        const wristToMid = new THREE.Vector3().subVectors(
            jp['middle-finger-metacarpal'], jp['wrist']
        ).normalize();
        const idxToPin = new THREE.Vector3().subVectors(
            jp['pinky-finger-metacarpal'], jp['index-finger-metacarpal']
        ).normalize();
        const palmNormal = new THREE.Vector3().crossVectors(wristToMid, idxToPin).normalize();

        const palmCenter = new THREE.Vector3().addVectors(
            jp['wrist'], jp['middle-finger-metacarpal']
        ).multiplyScalar(0.5);

        lastHandData = { fingerDirs, avgFinger, thumbDir, palmNormal, palmCenter };
        return lastHandData;
    }

    /* ═══════════════════════════════════════════════════════════
       FIST SHAKE
    ═══════════════════════════════════════════════════════════ */
    const fistShake = {
        wristHistory: [], reversals: 0, lastDir: 0,
        lastReversalTime: 0, cooldown: 0,
    };

    function detectFist() {
        if (!state.handTracked) return false;
        const pc = new THREE.Vector3().addVectors(
            jp['wrist'], jp['middle-finger-metacarpal']
        ).multiplyScalar(0.5);
        for (const f of FINGER_DEFS) {
            if (jp[f.tip].distanceTo(pc) > 0.08) return false;
        }
        return true;
    }

    function updateFistShake(dt) {
        if (fistShake.cooldown > 0) { fistShake.cooldown -= dt; return false; }
        if (!detectFist()) {
            fistShake.wristHistory = [];
            fistShake.reversals = 0;
            fistShake.lastDir = 0;
            return false;
        }

        const now = performance.now() / 1000;
        fistShake.wristHistory.push({ pos: jp['wrist'].clone(), time: now });
        while (fistShake.wristHistory.length > 0 && now - fistShake.wristHistory[0].time > 1.5) {
            fistShake.wristHistory.shift();
        }
        if (fistShake.wristHistory.length < 3) return false;

        const prev = fistShake.wristHistory[fistShake.wristHistory.length - 2];
        const curr = fistShake.wristHistory[fistShake.wristHistory.length - 1];
        const delta = new THREE.Vector3().subVectors(curr.pos, prev.pos);
        const speed = delta.length() / Math.max(0.001, curr.time - prev.time);
        if (speed < 0.3) return false;

        const ax = Math.abs(delta.x), ay = Math.abs(delta.y), az = Math.abs(delta.z);
        let dir = 0;
        if (ax >= ay && ax >= az) dir = Math.sign(delta.x);
        else if (ay >= ax && ay >= az) dir = Math.sign(delta.y);
        else dir = Math.sign(delta.z);

        if (fistShake.lastDir !== 0 && dir !== fistShake.lastDir) {
            fistShake.reversals++;
            fistShake.lastReversalTime = now;
        }
        fistShake.lastDir = dir;
        if (now - fistShake.lastReversalTime > 1.5) fistShake.reversals = 0;

        if (fistShake.reversals >= 3) {
            fistShake.reversals = 0;
            fistShake.wristHistory = [];
            fistShake.cooldown = 1.5;
            return true;
        }
        return false;
    }

    /* ═══════════════════════════════════════════════════════════
       PINCH
    ═══════════════════════════════════════════════════════════ */
    let wasPinching = false;
    function detectPinch() {
        if (!state.handTracked) return false;
        return jp['thumb-tip'].distanceTo(jp['index-finger-tip']) < 0.025;
    }

    /* ═══════════════════════════════════════════════════════════
       COLOR / PULSE HELPERS
    ═══════════════════════════════════════════════════════════ */
    function lerpC(a, b, t) { return a.clone().lerp(b, t); }

    // Pulse: returns a multiplier 0.6–1.0 that oscillates
    // Rate increases with alignment (slow throb → fast pulse)
    function pulseMultiplier(t, time) {
        if (t < 0.3) return 1.0; // no pulse below 30% alignment
        // Frequency: 1 Hz at t=0.3, up to 4 Hz at t=1.0
        const freq = 1.0 + t * 3.0;
        const amplitude = 0.2 + t * 0.2; // 0.2 → 0.4
        return 1.0 - amplitude + amplitude * (0.5 + 0.5 * Math.sin(time * freq * Math.PI * 2));
    }

    function setArrowColor(arrow, color, intensity) {
        arrow.cone.material.color.copy(color);
        arrow.cone.material.emissive.copy(color);
        arrow.cone.material.emissiveIntensity = 0.2 + intensity * 0.8;
        arrow.line.material.color.copy(color);
    }

    function setSceneArrowEmissive(arrow, intensity) {
        arrow.cone.material.emissiveIntensity = intensity;
    }

    function getZoneColor(jointName, ft, pt, tt, scaf) {
        if (FINGER_JOINTS.has(jointName)) {
            return scaf ? lerpC(cDim, cCyan, 0.15 + ft * 0.85) : lerpC(cNeutral, cCyan, ft);
        }
        if (THUMB_JOINTS.has(jointName)) {
            return scaf ? lerpC(cDim, cGreen, 0.15 + tt * 0.85) : lerpC(cNeutral, cGreen, tt);
        }
        return scaf ? lerpC(cDim, cAmber, 0.15 + pt * 0.85) : lerpC(cNeutral, cAmber, pt);
    }

    function getZoneT(jointName, ft, pt, tt) {
        if (FINGER_JOINTS.has(jointName)) return ft;
        if (THUMB_JOINTS.has(jointName)) return tt;
        return pt;
    }

    function getBoneZone(a, b) {
        if (FINGER_JOINTS.has(a) || FINGER_JOINTS.has(b)) return 'finger';
        if (THUMB_JOINTS.has(a) || THUMB_JOINTS.has(b)) return 'thumb';
        return 'palm';
    }

    /* ═══════════════════════════════════════════════════════════
       VISUAL UPDATE — tube hand, arrows, scene arrow response
    ═══════════════════════════════════════════════════════════ */
    function updateTubeHand(ft, pt, tt, scaf, showHand, time) {
        if (!showHand) {
            for (const n in tubeJoints) tubeJoints[n].visible = false;
            for (const b of tubeBones) b.mesh.visible = false;
            for (const w of palmWebs) w.mesh.visible = false;
            return;
        }

        const pFinger = pulseMultiplier(ft, time);
        const pPalm   = pulseMultiplier(pt, time);
        const pThumb  = pulseMultiplier(tt, time);

        // Joints
        for (const name of JOINT_NAMES) {
            const m = tubeJoints[name];
            m.position.copy(jp[name]);
            m.visible = true;

            const col = getZoneColor(name, ft, pt, tt, scaf);
            const zt = getZoneT(name, ft, pt, tt);
            const pulse = FINGER_JOINTS.has(name) ? pFinger : THUMB_JOINTS.has(name) ? pThumb : pPalm;
            m.material.color.copy(col);
            m.material.emissive.copy(col);
            m.material.emissiveIntensity = (0.15 + zt * 0.7) * pulse;
        }

        // Bones
        for (const b of tubeBones) {
            const pA = jp[b.a], pB = jp[b.b];
            if (!pA || !pB) { b.mesh.visible = false; continue; }
            const mid = new THREE.Vector3().lerpVectors(pA, pB, 0.5);
            const dir = new THREE.Vector3().subVectors(pB, pA);
            const len = dir.length();
            if (len < 0.001) { b.mesh.visible = false; continue; }
            dir.normalize();

            b.mesh.position.copy(mid);
            b.mesh.quaternion.setFromUnitVectors(UP, dir);
            b.mesh.scale.set(1, len, 1);
            b.mesh.visible = true;

            const zone = getBoneZone(b.a, b.b);
            const zt = zone === 'finger' ? ft : zone === 'thumb' ? tt : pt;
            const pulse = zone === 'finger' ? pFinger : zone === 'thumb' ? pThumb : pPalm;
            const col = getZoneColor(b.a, ft, pt, tt, scaf);
            b.mesh.material.color.copy(col);
            b.mesh.material.emissive.copy(col);
            b.mesh.material.emissiveIntensity = (0.1 + zt * 0.6) * pulse;
        }

        // Palm webs
        for (const w of palmWebs) {
            const pA = jp[w.a], pB = jp[w.b], pC = jp[w.c];
            if (!pA || !pB || !pC) { w.mesh.visible = false; continue; }

            const pos = w.mesh.geometry.attributes.position;
            pos.setXYZ(0, pA.x, pA.y, pA.z);
            pos.setXYZ(1, pB.x, pB.y, pB.z);
            pos.setXYZ(2, pC.x, pC.y, pC.z);
            pos.needsUpdate = true;
            w.mesh.geometry.computeVertexNormals();
            w.mesh.visible = true;

            const col = getZoneColor('wrist', ft, pt, tt, scaf);
            w.mesh.material.color.copy(col);
            w.mesh.material.emissive.copy(col);
            w.mesh.material.emissiveIntensity = (0.08 + pt * 0.4) * pPalm;
        }
    }

    function updateOverlayArrows(hd, ft, pt, tt, scaf, showOverlay, time) {
        if (!showOverlay || !hd) {
            fingerArrows.forEach(a => a.visible = false);
            thumbOverlay.visible = false;
            palmOverlay.visible = false;
            fingerLabels.forEach(l => l.visible = false);
            thumbLbl.visible = false;
            palmLbl.visible = false;
            return;
        }

        const pFinger = pulseMultiplier(ft, time);
        const pThumb  = pulseMultiplier(tt, time);
        const pPalm   = pulseMultiplier(pt, time);

        let fCol, pCol, tCol;
        if (scaf) {
            fCol = lerpC(cDim, cCyan,  0.3 + ft * 0.7);
            pCol = lerpC(cDim, cAmber, 0.3 + pt * 0.7);
            tCol = lerpC(cDim, cGreen, 0.3 + tt * 0.7);
        } else {
            fCol = lerpC(cNeutral, cCyan,  ft);
            pCol = lerpC(cNeutral, cAmber, pt);
            tCol = lerpC(cNeutral, cGreen, tt);
        }

        // Finger arrows
        FINGER_DEFS.forEach((f, i) => {
            const arrow = fingerArrows[i];
            arrow.position.copy(jp[f.distal]);
            arrow.setDirection(hd.fingerDirs[i]);
            arrow.setLength(0.05, 0.014, 0.008);
            setArrowColor(arrow, fCol, ft * pFinger);
            arrow.visible = true;

            const lbl = fingerLabels[i];
            if (scaf) {
                lbl.position.copy(jp[f.tip]).addScaledVector(hd.fingerDirs[i], 0.045);
                lbl.visible = true;
            } else { lbl.visible = false; }
        });

        // Thumb
        thumbOverlay.position.copy(jp[THUMB_DEF.distal]);
        thumbOverlay.setDirection(hd.thumbDir);
        thumbOverlay.setLength(0.055, 0.016, 0.009);
        setArrowColor(thumbOverlay, tCol, tt * pThumb);
        thumbOverlay.visible = true;
        if (scaf) {
            thumbLbl.position.copy(jp[THUMB_DEF.tip]).addScaledVector(hd.thumbDir, 0.045);
            thumbLbl.visible = true;
        } else { thumbLbl.visible = false; }

        // Palm
        palmOverlay.position.copy(hd.palmCenter);
        palmOverlay.setDirection(hd.palmNormal);
        palmOverlay.setLength(0.07, 0.020, 0.012);
        setArrowColor(palmOverlay, pCol, pt * pPalm);
        palmOverlay.visible = true;
        if (scaf) {
            palmLbl.position.copy(hd.palmCenter).addScaledVector(hd.palmNormal, 0.12);
            palmLbl.visible = true;
        } else { palmLbl.visible = false; }
    }

    function updateSceneArrows(ft, pt, tt, time) {
        // v arrow responds to finger alignment
        const vPulse = pulseMultiplier(ft, time);
        const vEmissive = SCENE_ARROW_BASE_EMISSIVE + ft * (SCENE_ARROW_MAX_EMISSIVE - SCENE_ARROW_BASE_EMISSIVE);
        setSceneArrowEmissive(vArrow, vEmissive * vPulse);

        // B arrow responds to palm alignment
        const bPulse = pulseMultiplier(pt, time);
        const bEmissive = SCENE_ARROW_BASE_EMISSIVE + pt * (SCENE_ARROW_MAX_EMISSIVE - SCENE_ARROW_BASE_EMISSIVE);
        setSceneArrowEmissive(bArrow, bEmissive * bPulse);

        // F arrow (when visible) responds to thumb
        if (fArrow.visible) {
            const fPulse = pulseMultiplier(tt, time);
            const fEmissive = SCENE_ARROW_BASE_EMISSIVE + tt * (SCENE_ARROW_MAX_EMISSIVE - SCENE_ARROW_BASE_EMISSIVE);
            setSceneArrowEmissive(fArrow, fEmissive * fPulse);
        }
    }

    /* ═══════════════════════════════════════════════════════════
       VR INIT
    ═══════════════════════════════════════════════════════════ */
    const vrBtn = document.getElementById('enter-vr');
    const statusEl = document.getElementById('status');

    async function initVR() {
        if (!navigator.xr) {
            vrBtn.textContent = 'WebXR Not Available';
            statusEl.textContent = 'Browser does not support WebXR.';
            return;
        }
        const ok = await navigator.xr.isSessionSupported('immersive-vr');
        if (!ok) {
            vrBtn.textContent = 'VR Not Supported';
            statusEl.textContent = 'No VR headset detected.';
            return;
        }
        vrBtn.disabled = false;
        vrBtn.textContent = 'ENTER VR';
        vrBtn.addEventListener('click', async () => {
            try {
                const session = await navigator.xr.requestSession('immersive-vr', {
                    optionalFeatures: ['hand-tracking', 'local-floor']
                });
                renderer.xr.setReferenceSpaceType('local-floor');
                await renderer.xr.setSession(session);
                document.getElementById('overlay').style.display = 'none';
                state.phase = 'waiting';
            } catch (err) {
                statusEl.textContent = `VR failed: ${err.message}`;
            }
        });
    }
    initVR();

    /* ═══════════════════════════════════════════════════════════
       MAIN LOOP
    ═══════════════════════════════════════════════════════════ */
    const clock = new THREE.Clock();
    let elapsed = 0;

    renderer.setAnimationLoop(() => {
        const dt = clock.getDelta();
        elapsed += dt;
        const hd = readRightHand();

        // Fist shake
        if (updateFistShake(dt)) {
            state.mode = state.mode === 'scaffolded' ? 'prediction' : 'scaffolded';
        }

        // Pinch
        const isPinching = detectPinch();
        const pinchTriggered = isPinching && !wasPinching;
        wasPinching = isPinching;

        // Phase logic
        if (state.phase === 'waiting' && state.handTracked) {
            generateRound();
        }

        if (state.phase === 'orienting' && hd) {
            state.fingerAlign = hd.avgFinger.dot(state.currentV);
            state.palmAlign   = hd.palmNormal.dot(state.currentB);
            state.thumbAlign  = hd.thumbDir.dot(state.expectedF);

            state.fingerOk = state.fingerAlign >= ALIGN_THRESHOLD;
            state.palmOk   = state.palmAlign   >= ALIGN_THRESHOLD;
            state.thumbOk  = state.thumbAlign  >= ALIGN_THRESHOLD;

            if (state.fingerOk && state.palmOk && state.thumbOk) {
                state.lockTimer += dt;
                if (state.lockTimer >= LOCK_HOLD) {
                    state.phase = 'locked';
                    state.score.total++;
                    state.score.correct++;
                    state.streak++;
                    fArrow.visible = true;
                    fLblScene.visible = true;
                    launchParticle(vectorOrigin.clone(), state.expectedF);
                    setTimeout(() => {
                        if (state.phase === 'locked') state.phase = 'paused';
                    }, 1200);
                }
            } else {
                state.lockTimer = Math.max(0, state.lockTimer - dt * 2);
            }
        } else if (state.phase === 'orienting') {
            state.lockTimer = 0;
        }

        if (state.phase === 'paused' && pinchTriggered) {
            if (state.difficulty === 'cardinal' && state.streak >= STREAK_UNLOCK) {
                state.difficulty = 'arbitrary';
            }
            generateRound();
        }

        // Visual params
        const scaf = state.mode === 'scaffolded';
        const rng = ALIGN_THRESHOLD - 0.3;
        const showAligned = state.phase === 'orienting' || state.phase === 'locked' || state.phase === 'paused';

        let ft = 0, pt = 0, tt = 0;
        if (showAligned) {
            ft = Math.max(0, Math.min(1, (state.fingerAlign - 0.3) / rng));
            pt = Math.max(0, Math.min(1, (state.palmAlign   - 0.3) / rng));
            tt = Math.max(0, Math.min(1, (state.thumbAlign  - 0.3) / rng));
        }
        if (state.phase === 'locked' || state.phase === 'paused') {
            ft = 1; pt = 1; tt = 1;
        }

        // Update visuals
        updateTubeHand(ft, pt, tt, scaf, state.handTracked, elapsed);

        const showOverlay = state.handTracked &&
            (state.phase === 'orienting' || state.phase === 'locked' || state.phase === 'paused');
        updateOverlayArrows(hd || lastHandData, ft, pt, tt, scaf, showOverlay, elapsed);

        // Scene arrow response
        if (showAligned) {
            updateSceneArrows(ft, pt, tt, elapsed);
        } else {
            setSceneArrowEmissive(vArrow, SCENE_ARROW_BASE_EMISSIVE);
            setSceneArrowEmissive(bArrow, SCENE_ARROW_BASE_EMISSIVE);
        }

        // Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.mesh.position.addScaledVector(p.vel, dt);
            p.life -= dt;
            p.mesh.material.opacity = Math.max(0, p.life / 2);
            if (p.life <= 0) {
                scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
                particles.splice(i, 1);
            }
        }

        // HUD face camera
        if (renderer.xr.isPresenting) {
            const cp = new THREE.Vector3();
            camera.getWorldPosition(cp);
            hudMesh.lookAt(cp);
        }

        drawHUD();
        renderer.render(scene, camera);
    });

    addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });
    </script>
</body>
</html>
